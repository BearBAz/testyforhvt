<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ระบบจองห้องประชุม ศฝฟ.</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --primary-light: #8B5CF6;
            --primary-soft: #EDE9FE;
            --accent: #F59E0B;
            --danger: #EF4444;
            --success: #10B981;
            --bg: #F5F3FF;
            --card: #FFFFFF;
            --text: #1E1B4B;
            --muted: #6B7280;
            --border: #E5E7EB;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Sarabun',sans-serif; background:var(--bg); min-height:100vh; color:var(--text); }
        .app-wrap { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }

        /* HERO */
        .hero {
            background: linear-gradient(145deg, #7C3AED 0%, #5B21B6 55%, #4C1D95 100%);
            padding: 3rem 1.5rem 5.5rem;
            position: relative; overflow: hidden; text-align: center;
        }
        .hero::before {
            content:''; position:absolute; top:-80px; right:-60px;
            width:260px; height:260px; background:rgba(255,255,255,0.07); border-radius:50%;
        }
        .hero::after {
            content:''; position:absolute; bottom:-60px; left:-50px;
            width:200px; height:200px; background:rgba(255,255,255,0.05); border-radius:50%;
        }
        .hero-orb {
            position:absolute; top:40px; left:20px;
            width:100px; height:100px; background:rgba(245,158,11,0.12); border-radius:50%;
        }
        .hero-icon {
            width:84px; height:84px; background:rgba(255,255,255,0.18);
            border-radius:24px; display:inline-flex; align-items:center; justify-content:center;
            margin-bottom:1rem; backdrop-filter:blur(12px); position:relative; z-index:1;
            border:1px solid rgba(255,255,255,0.25); box-shadow:0 8px 32px rgba(0,0,0,0.15);
        }
        .hero-icon i { font-size:2.2rem; color:#fff; }
        .hero-title { font-size:1.9rem; font-weight:700; color:#fff; position:relative; z-index:1; margin-bottom:0.4rem; letter-spacing:-0.5px; }
        .hero-sub { font-size:0.88rem; color:rgba(255,255,255,0.82); position:relative; z-index:1; }

        /* PROFILE CHIP */
        .profile-chip {
            display:flex; align-items:center; gap:0.75rem;
            background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.3);
            border-radius:50px; padding:0.5rem 1rem;
            margin:1rem auto 0; width:fit-content;
            position:relative; z-index:1; backdrop-filter:blur(10px);
        }
        .profile-avatar { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .profile-avatar img { width:100%; height:100%; object-fit:cover; }
        .profile-avatar i { color:#fff; font-size:1rem; }
        .profile-name { font-size:0.9rem; color:#fff; font-weight:500; }

        /* MENU */
        .menu-section { flex:1; padding:0 1rem 2rem; margin-top:-3rem; position:relative; z-index:3; }
        .menu-grid { display:flex; flex-direction:column; gap:1rem; }
        .menu-card {
            background:var(--card); border-radius:20px; padding:1.5rem;
            display:flex; align-items:center; gap:1.25rem;
            box-shadow:0 4px 20px rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.08);
            cursor:pointer; transition:all 0.28s ease;
            text-decoration:none; color:inherit; position:relative; overflow:hidden;
        }
        .menu-card:hover, .menu-card:active {
            transform:translateY(-3px); box-shadow:0 10px 28px rgba(124,58,237,0.18);
            border-color:rgba(124,58,237,0.25); color:inherit;
        }
        .menu-card::after { content:''; position:absolute; right:-24px; top:50%; transform:translateY(-50%); width:90px; height:90px; border-radius:50%; opacity:0.06; }
        .menu-card.violet::after { background:#7C3AED; }
        .menu-card.amber::after { background:#F59E0B; }
        .menu-card.indigo::after { background:#4F46E5; }

        .menu-icon { width:62px; height:62px; border-radius:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .menu-icon.violet { background:linear-gradient(135deg, #7C3AED, #8B5CF6); }
        .menu-icon.amber { background:linear-gradient(135deg, #F59E0B, #D97706); }
        .menu-icon.indigo { background:linear-gradient(135deg, #4F46E5, #6366F1); }
        .menu-icon i { font-size:1.5rem; color:#fff; }

        .menu-text { flex:1; }
        .menu-label { font-size:1.1rem; font-weight:700; margin-bottom:0.2rem; color:var(--text); }
        .menu-desc { font-size:0.84rem; color:var(--muted); }
        .menu-arrow { color:#C4B5FD; font-size:1rem; }

        /* LOADING */
        .loading-screen {
            position:fixed; inset:0;
            background:linear-gradient(145deg, #7C3AED, #5B21B6);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:9999; transition:opacity 0.5s ease;
        }
        .loading-screen.hide { opacity:0; pointer-events:none; }
        .loading-logo { width:90px; height:90px; background:rgba(255,255,255,0.18); border-radius:28px; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem; animation:pulse-logo 1.5s ease-in-out infinite; }
        .loading-logo i { font-size:2.5rem; color:#fff; }
        @keyframes pulse-logo { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
        .loading-text { color:rgba(255,255,255,0.9); font-size:1rem; font-weight:500; }
        .loading-dots::after { content:'...'; animation:dots 1.5s steps(4,end) infinite; }
        @keyframes dots { 0%,100%{content:'.';} 33%{content:'..';} 66%{content:'...';} }

        /* FOOTER */
        .app-footer { text-align:center; padding:1.5rem 1rem 2rem; color:var(--muted); font-size:0.82rem; }
        .app-footer i { color:var(--primary); margin-right:0.3rem; }

        /* PENDING BADGE */
        .pending-badge { background:var(--danger); color:#fff; font-size:0.7rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:10px; min-width:20px; text-align:center; }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-logo"><i class="fas fa-door-open"></i></div>
    <div class="loading-text">กำลังเข้าสู่ระบบ<span class="loading-dots"></span></div>
</div>

<div class="app-wrap" id="mainApp" style="display:none;">
    <div class="hero">
        <div class="hero-orb"></div>
        <div class="hero-icon"><i class="fas fa-door-open"></i></div>
        <div class="hero-title">ระบบจองห้องประชุม</div>
        <div class="hero-sub">ศูนย์ฝึกปฏิบัติการไฟฟ้าแรงสูง (ศฝฟ.)</div>
        <div class="profile-chip" id="profileChip" style="display:none;">
            <div class="profile-avatar" id="profileAvatar"><i class="fas fa-user"></i></div>
            <span class="profile-name" id="profileName">กำลังโหลด...</span>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-grid">
            <a href="booking.html" class="menu-card violet">
                <div class="menu-icon violet"><i class="fas fa-calendar-plus"></i></div>
                <div class="menu-text">
                    <div class="menu-label">จองห้องประชุม</div>
                    <div class="menu-desc">เลือกห้อง วันที่ และรายละเอียดการใช้งาน</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
            <a href="confirm.html" class="menu-card amber">
                <div class="menu-icon amber"><i class="fas fa-clipboard-check"></i></div>
                <div class="menu-text">
                    <div class="menu-label">ยืนยันการจอง</div>
                    <div class="menu-desc">ยืนยันรายการที่ได้รับการอนุมัติแล้ว</div>
                </div>
                <div style="display:flex;align-items:center;gap:0.5rem;">
                    <span class="pending-badge" id="pendingBadge" style="display:none;">0</span>
                    <i class="fas fa-chevron-right menu-arrow"></i>
                </div>
            </a>
            <a href="status.html" class="menu-card indigo">
                <div class="menu-icon indigo"><i class="fas fa-search"></i></div>
                <div class="menu-text">
                    <div class="menu-label">ตรวจสอบสถานะการจอง</div>
                    <div class="menu-desc">ดูรายการจองที่อนุมัติและยืนยันแล้ว</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
        </div>
    </div>

    <div class="app-footer"><i class="fas fa-phone-alt"></i>ติดต่อสอบถาม โทร. 034-339-224 และ (33)15619</div>
</div>

<script>
const LIFF_ID = "xxx";
const GAS_URL = "xxx";

async function init() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        sessionStorage.setItem('userId', profile.userId);
        sessionStorage.setItem('displayName', profile.displayName);
        sessionStorage.setItem('pictureUrl', profile.pictureUrl || '');
        sessionStorage.setItem('liffReady', 'true');
        document.getElementById('profileName').textContent = profile.displayName;
        if (profile.pictureUrl) {
            document.getElementById('profileAvatar').innerHTML = `<img src="${profile.pictureUrl}" alt="avatar">`;
        }
        document.getElementById('profileChip').style.display = 'flex';
        loadPendingCount(profile.userId);
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hide');
            document.getElementById('mainApp').style.display = 'flex';
        }, 800);
    } catch(err) {
        console.error('LIFF init error:', err);
        document.querySelector('.loading-text').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    }
}

async function loadPendingCount(userId) {
    try {
        const res = await fetch(`${GAS_URL}?action=getApprovedBookings&userId=${userId}`);
        const result = await res.json();
        if (result.bookings && result.bookings.length > 0) {
            const badge = document.getElementById('pendingBadge');
            badge.textContent = result.bookings.length;
            badge.style.display = 'inline-block';
        }
    } catch(e) { console.error('loadPendingCount error:', e); }
}

init();
</script>
</body>
</html>
