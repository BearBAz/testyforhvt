<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ตรวจสอบสถานะการจอง ศฝฟ.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ── Unified brand system (เหมือน index.html/booking.html/confirm.html) ── */
            --violet-900: #06264D;
            --violet-700: #0B4DA2;
            --violet-600: #0B4DA2;
            --violet-500: #2F7BE0;
            --violet-300: #7FB0EA;
            --violet-100: #EAF2FF;
            --violet-50:  #F5F9FF;
            --coral-600: #C15A0E;
            --coral-500: #FF7A1A;
            --coral-100: #FFF1E4;
            --teal-600: #0E8A7A;
            --teal-500: #17C3B2;
            --teal-100: #DEFBF6;
            --sun-500: #FFB648;
            --sun-100: #FFF3DE;
            --pink-500: #FF4D8D;
            --ink-900: #0F1B2D;
            --ink-600: #47566B;
            --ink-400: #64748B;
            --line: #E4EAF3;
            --line-strong: #CBD5E1;
            --surface: #FFFFFF;
            --bg: #F1F5FB;
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --shadow-sm: 0 2px 10px rgba(6,38,77,0.08);
            --shadow-md: 0 8px 28px rgba(6,38,77,0.14);
            --gradient-hero: linear-gradient(150deg, #06264D 0%, #0B4DA2 60%, #2F7BE0 100%);
            --gradient-coral: linear-gradient(135deg, #FF7A1A 0%, #FF9640 100%);
            --gradient-teal: linear-gradient(135deg, #17C3B2 0%, #4DD8C8 100%);
            --gradient-violet: linear-gradient(135deg, #0B4DA2 0%, #2F7BE0 100%);
            --gradient-sun: linear-gradient(135deg, #FFB648 0%, #FFCE7C 100%);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--ink-900); -webkit-font-smoothing: antialiased; }
        h1, h2, .display-font { font-family: 'Prompt', 'Sarabun', sans-serif; }
        .app-wrap { max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); }

        /* ===== HEADER ===== */
        .page-header {
            background: var(--gradient-hero);
            padding: 1.5rem 1.5rem 1.8rem;
            position: relative;
            overflow: hidden;
            border-radius: 0; /* กรอบสี่เหลี่ยมเหมือนหน้า index */
        }
        .header-dots {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.14) 1.5px, transparent 1.5px);
            background-size: 22px 22px;
        }
        .header-blob {
            position: absolute; top: -50px; right: -50px;
            width: 180px; height: 180px;
            background: rgba(255,255,255,0.12); border-radius: 50%;
        }
        .header-inner { position: relative; z-index: 2; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
        .live-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; padding: 0.3rem 0.8rem;
            font-size: 0.7rem; color: #fff; font-weight: 700;
            backdrop-filter: blur(8px);
        }
        .live-badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #baffcf;
            box-shadow: 0 0 6px rgba(186,255,207,0.9);
            animation: blink 2s ease infinite;
            display: inline-block;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .back-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: rgba(255,255,255,0.9); font-size: 0.85rem; font-weight: 600;
            text-decoration: none;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 20px; padding: 0.35rem 0.8rem;
        }
        .back-btn:hover { color: #fff; }
        .page-title { font-family:'Prompt',sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
        .page-sub { font-size: 0.85rem; color: rgba(255,255,255,0.8); }

        /* Header เป็นขอบตรงต่อเนื่องเหมือนหน้า index */
        .ticket-edge { display: none; }

        /* ===== CONTENT ===== */
        .content { padding: 0 1rem 1.5rem; margin-top: -0.4rem; }

        .section-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--line);
        }
        .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
        .section-title-text { font-size: 0.95rem; font-weight: 700; color: var(--ink-900); display: flex; align-items: center; gap: 0.5rem; }
        .section-title-text i { color: var(--violet-600); }
        .count-pill { background: var(--violet-100); color: var(--violet-600); font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 12px; }

        /* ===== BOOKING CARD (ticket-style) ===== */
        .booking-card {
            background: var(--surface);
            border: 1.5px solid var(--line);
            border-radius: var(--radius);
            padding: 0;
            margin-bottom: 0.85rem;
            transition: all 0.2s ease;
            overflow: hidden;
            position: relative;
        }
        .booking-card:last-child { margin-bottom: 0; }
        .booking-card:hover { border-color: var(--line-strong); box-shadow: var(--shadow-sm); }
        .booking-card-stripe { height: 5px; }
        .booking-card-stripe.approved { background: var(--gradient-sun); }
        .booking-card-stripe.confirmed { background: var(--gradient-teal); }
        .booking-card-body { padding: 1.05rem 1.1rem; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.65rem; }
        .booking-id {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: var(--violet-100); color: var(--violet-700);
            font-size: 0.75rem; font-weight: 700; padding: 0.22rem 0.65rem; border-radius: 8px;
        }
        .booking-id i { font-size: 0.65rem; }
        .seg-count-chip {
            display: inline-flex; align-items: center; gap: 0.25rem;
            font-size: 0.68rem; font-weight: 800; color: var(--coral-600);
            background: var(--coral-100); padding: 0.15rem 0.5rem; border-radius: 20px; margin-left: 0.35rem;
        }

        /* Status pills */
        .status-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-pill.approved { background: var(--sun-100); color: #B4700C; }
        .status-pill.confirmed { background: var(--teal-100); color: var(--teal-600); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-pill.approved .status-dot { background: var(--sun-500); }
        .status-pill.confirmed .status-dot { background: var(--teal-500); }

        .course-name { font-size: 1.02rem; font-weight: 700; color: var(--ink-900); margin-bottom: 0.6rem; line-height: 1.4; }

        .meta-row { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; margin-bottom: 0.6rem; }
        .meta-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; color: var(--ink-600); }
        .meta-item i { color: var(--violet-500); width: 13px; text-align: center; font-size: 0.75rem; }
        .meta-item.green i { color: var(--teal-600); }

        /* Room segments list */
        .seg-list { display: flex; flex-direction: column; gap: 0.4rem; margin: 0.5rem 0 0.2rem; }
        .seg-row {
            display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
            background: var(--violet-50); border-radius: 10px; padding: 0.45rem 0.65rem;
            font-size: 0.78rem;
        }
        .seg-row-label { display: flex; align-items: center; gap: 0.4rem; font-weight: 700; color: var(--ink-900); }
        .seg-row-num {
            background: var(--violet-500); color: #fff; font-size: 0.62rem; font-weight: 800;
            width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .seg-row-date { color: var(--ink-400); font-weight: 600; }

        /* Expand section */
        .expand-btn {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.78rem; color: var(--violet-600); cursor: pointer;
            font-weight: 700; margin-top: 0.4rem;
            background: var(--violet-100); border-radius: 8px;
            padding: 0.32rem 0.7rem; transition: all 0.2s;
        }
        .expand-btn:hover { background: var(--violet-300); color: #fff; }

        .card-detail { display: none; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1.5px dashed var(--line); }
        .booking-card.expanded .card-detail { display: block; }

        .detail-grid { display: flex; flex-direction: column; gap: 0; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 0.82rem; color: var(--ink-400); }
        .detail-value { font-size: 0.88rem; font-weight: 600; color: var(--ink-900); text-align: right; max-width: 60%; }

        /* Progress timeline (สถานะจริงเป็นลำดับขั้นตอน จึงใช้ stepper ได้) */
        .timeline { display: flex; align-items: flex-start; gap: 0; margin: 0.9rem 0 0.3rem; }
        .tl-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .tl-dot {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--line); color: var(--ink-400);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.68rem; font-weight: 800; z-index: 2;
        }
        .tl-step.done .tl-dot { background: var(--gradient-teal); color: #fff; }
        .tl-step.current .tl-dot { background: var(--gradient-coral); color: #fff; box-shadow: 0 0 0 4px var(--coral-100); }
        .tl-line { position: absolute; top: 12px; left: 50%; width: 100%; height: 2px; background: var(--line); z-index: 1; }
        .tl-step.done .tl-line { background: var(--teal-500); }
        .tl-step:last-child .tl-line { display: none; }
        .tl-label { font-size: 0.62rem; color: var(--ink-400); margin-top: 0.35rem; text-align: center; font-weight: 600; }
        .tl-step.done .tl-label, .tl-step.current .tl-label { color: var(--ink-900); font-weight: 700; }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--ink-400); }
        .empty-icon {
            width: 72px; height: 72px; background: var(--violet-100); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem;
        }
        .empty-icon i { font-size: 2rem; color: var(--violet-500); opacity: 0.6; }
        .empty-title { font-size: 1.05rem; font-weight: 700; color: var(--ink-600); margin-bottom: 0.4rem; }
        .empty-sub { font-size: 0.85rem; line-height: 1.5; }

        /* ===== SKELETON ===== */
        .skeleton { background: linear-gradient(90deg, #EAF2FF 25%, #F5F9FF 50%, #EAF2FF 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
        .skel-card { height: 90px; margin-bottom: 0.75rem; border-radius: var(--radius); }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

        /* ===== BOTTOM NAV (เหมือนหน้าอื่น) ===== */


        /* ===== 2026 WEB APP EXPERIENCE ===== */
        :root {
            --bg: #F4F7FC;
            --glass: rgba(255,255,255,.78);
            --ease-spring: cubic-bezier(.2,.8,.2,1);
            --focus-ring: 0 0 0 4px rgba(47,123,224,.18);
        }
        html { background:#EAF0F8; scroll-behavior:smooth; }
        body {
            min-height:100vh;
            background:
                radial-gradient(circle at 6% 0%, rgba(47,123,224,.11), transparent 30rem),
                radial-gradient(circle at 100% 88%, rgba(23,195,178,.08), transparent 28rem),
                var(--bg);
        }
        a, button, .expand-btn { -webkit-tap-highlight-color:transparent; }
        a:focus-visible, button:focus-visible, .expand-btn:focus-visible { outline:none; box-shadow:var(--focus-ring); }
        .app-wrap {
            width:100%; max-width:600px; position:relative;
            box-shadow:0 0 0 1px rgba(6,38,77,.03), 0 30px 100px rgba(6,38,77,.10);
        }
        .page-header {
            min-height:300px;
            padding:calc(1.25rem + env(safe-area-inset-top)) 1.25rem 3.4rem;
            border-radius:0;
            background:
                radial-gradient(circle at 90% 12%, rgba(111,185,255,.34), transparent 28%),
                radial-gradient(circle at 0% 100%, rgba(23,195,178,.20), transparent 34%),
                linear-gradient(145deg,#041B38 0%,#073B76 48%,#0B5DB8 100%);
            isolation:isolate;
        }
        .page-header::after {
            content:''; position:absolute; width:360px; height:240px; right:-140px; bottom:-140px;
            border-radius:48%; background:rgba(255,255,255,.08); transform:rotate(-13deg); z-index:-1;
        }
        .header-dots { opacity:.30; mask-image:linear-gradient(to bottom,#000,transparent 90%); }
        .header-blob { width:220px; height:220px; top:-120px; right:-95px; background:rgba(255,255,255,.07); }
        .header-top-row { margin-bottom:2.2rem; }
        .back-btn, .live-badge {
            min-height:38px; border-radius:12px; padding:.46rem .78rem;
            background:rgba(255,255,255,.10); border-color:rgba(255,255,255,.18);
            box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
        }
        .back-btn { transition:transform .22s var(--ease-spring),background .22s ease; }
        .back-btn:hover { background:rgba(255,255,255,.18); transform:translateX(-2px); }
        .live-badge-dot { background:#67F2BA; box-shadow:0 0 0 4px rgba(103,242,186,.12),0 0 12px rgba(103,242,186,.55); }
        .page-eyebrow { display:flex; align-items:center; gap:.4rem; margin-bottom:.45rem; color:#8EDCFF; font-size:.66rem; font-weight:800; letter-spacing:.12em; }
        .page-title { font-size:clamp(1.75rem,7vw,2.25rem); letter-spacing:-.04em; margin-bottom:.35rem; }
        .page-sub { max-width:390px; color:rgba(255,255,255,.72); font-size:.88rem; }
        .header-chips { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1.2rem; }
        .header-chips span { display:inline-flex; align-items:center; gap:.38rem; min-height:32px; padding:.38rem .68rem; border-radius:10px; color:rgba(255,255,255,.88); font-size:.7rem; font-weight:700; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14); }
        .header-chips i { color:#8EDCFF; font-size:.67rem; }

        .content { margin-top:-1.9rem; padding:0 1rem calc(1.5rem + env(safe-area-inset-bottom)); position:relative; z-index:4; }
        .section-card {
            padding:1rem; border-radius:22px;
            background:var(--glass); border:1px solid rgba(255,255,255,.80);
            box-shadow:0 20px 60px rgba(6,38,77,.13), inset 0 1px 0 #fff;
            backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
        }
        .section-head { align-items:flex-start; gap:.8rem; padding:.15rem .15rem .9rem; margin-bottom:.15rem; }
        .section-title-wrap { min-width:0; }
        .section-title-text { font-family:'Prompt',sans-serif; font-size:.98rem; letter-spacing:-.015em; }
        .section-title-text i { display:grid; place-items:center; width:28px; height:28px; border-radius:9px; color:#fff; background:var(--gradient-violet); box-shadow:0 7px 16px rgba(11,77,162,.25); }
        .section-subtitle { margin:3px 0 0 36px; font-size:.69rem; color:var(--ink-400); }
        .count-pill { flex-shrink:0; border-radius:9px; padding:.3rem .64rem; background:#EDF4FF; border:1px solid #DCE9FB; }

        .booking-card {
            margin-bottom:.8rem; border:1px solid rgba(203,213,225,.74); border-radius:18px;
            background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(250,252,255,.91));
            box-shadow:0 7px 22px rgba(6,38,77,.065), inset 0 1px 0 #fff;
            transition:transform .26s var(--ease-spring),box-shadow .26s ease,border-color .26s ease;
        }
        .booking-card:hover { transform:translateY(-2px); border-color:rgba(47,123,224,.25); box-shadow:0 14px 34px rgba(6,38,77,.12); }
        .booking-card-stripe { height:4px; }
        .booking-card-body { padding:1rem; }
        .booking-id { border-radius:8px; background:#EDF4FF; }
        .seg-count-chip { border-radius:8px; }
        .status-pill { border-radius:9px; padding:.3rem .62rem; }
        .status-pill.approved { border:1px solid rgba(255,182,72,.25); }
        .status-pill.confirmed { border:1px solid rgba(23,195,178,.22); }
        .course-name { font-family:'Prompt',sans-serif; font-size:1rem; letter-spacing:-.015em; }
        .meta-row { gap:.45rem; }
        .meta-item { padding:.3rem .48rem; border-radius:8px; background:#F7F9FC; border:1px solid #EDF1F6; font-size:.75rem; }
        .seg-row { border:1px solid #E7EFFA; border-radius:9px; }
        .timeline { margin-top:1.1rem; }
        .tl-dot { box-shadow:0 0 0 3px #fff; }
        .expand-btn {
            width:100%; justify-content:center; min-height:40px; margin-top:.9rem;
            border-radius:11px; border:1px solid #DCE9FB; background:#F3F7FD;
            transition:background .2s ease,transform .2s var(--ease-spring);
        }
        .expand-btn:hover { background:#E6F0FF; color:var(--violet-700); }
        .expand-btn:active { transform:scale(.985); }
        .card-detail { animation:detailIn .28s ease; }
        @keyframes detailIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
        .detail-row { min-height:42px; }
        .empty-state { padding:3.5rem 1rem; }
        .empty-icon { border-radius:22px; background:linear-gradient(145deg,#EDF4FF,#E5EEFB); box-shadow:inset 0 1px 0 #fff; }
        .skeleton { background:linear-gradient(90deg,#EAF0F8 25%,#F8FAFD 50%,#EAF0F8 75%); background-size:200% 100%; }

        @media (min-width:800px) {
            body { padding:2rem; }
            .app-wrap { max-width:1040px; min-height:calc(100vh - 4rem); border-radius:28px; overflow:hidden; }
            .page-header { min-height:320px; padding:2rem 3rem 4.2rem; }
            .content { padding-inline:2rem; }
            .section-card { padding:1.25rem; }
            #statusList { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; align-items:start; }
            .booking-card { margin-bottom:0; }
            .empty-state { grid-column:1/-1; }
            .skel-card { margin:0; }
        }
        @media (max-width:380px) {
            .page-header { padding-inline:1rem; }
            .content { padding-inline:.75rem; }
            .section-card { padding:.75rem; }
            .card-top { gap:.45rem; }
            .status-pill { font-size:.68rem; }
        }
        @media (prefers-reduced-motion:reduce) {
            *,*::before,*::after { animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; scroll-behavior:auto !important; }
        }

    </style>
</head>
<body>
<div class="app-wrap">
    <div class="page-header">
        <div class="header-dots"></div>
        <div class="header-blob"></div>
        <div class="header-inner">
            <div class="header-top-row">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> หน้าหลัก</a>
                <div class="live-badge"><span class="live-badge-dot"></span> อัปเดตล่าสุด</div>
            </div>
            <div class="page-eyebrow"><i class="fas fa-sparkles"></i> BOOKING ACTIVITY</div>
            <div class="page-title">สถานะการจอง</div>
            <div class="page-sub">ติดตามทุกขั้นตอนของรายการจองได้ในที่เดียว</div>
            <div class="header-chips" aria-label="ประเภทสถานะ">
                <span><i class="fas fa-clock"></i> รอยืนยัน</span>
                <span><i class="fas fa-circle-check"></i> ยืนยันแล้ว</span>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="section-card">
            <div class="section-head">
                <div class="section-title-wrap"><div class="section-title-text"><i class="fas fa-layer-group"></i> รายการจองของคุณ</div><div class="section-subtitle">แตะ “ดูรายละเอียด” เพื่อตรวจสอบข้อมูลเพิ่มเติม</div></div>
                <span class="count-pill" id="countText">กำลังโหลด...</span>
            </div>
            <div id="statusList">
                <div class="skeleton skel-card"></div>
                <div class="skeleton skel-card"></div>
            </div>
        </div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxw0_Gn42bLLXoOTQbHm3YLwWKsavO3_3WJth6lFXNB6NwtkwVCCZDcAGfAmMQQ8CJWOQ/exec"; // ← ใส่ GAS Web App URL

function init() {
    const userId = sessionStorage.getItem('userId') || '';
    if (!userId) { window.location.href = 'index.html'; return; }
    loadStatus(userId);
}

async function loadStatus(userId) {
    try {
        const res = await fetch(`${GAS_URL}?action=getAllBookings&userId=${userId}`);
        const result = await res.json();
        const bookings = (result.bookings || []).filter(b =>
            b.approvalStatus === 'Approved' || b.approvalStatus === 'Confirmed'
        );
        renderStatus(bookings);
    } catch(e) {
        document.getElementById('statusList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-exclamation"></i></div>
                <div class="empty-title">ไม่สามารถโหลดข้อมูลได้</div>
                <div class="empty-sub">กรุณาลองใหม่อีกครั้ง</div>
            </div>`;
        document.getElementById('countText').textContent = 'ข้อผิดพลาด';
    }
}

function renderStatus(bookings) {
    const container = document.getElementById('statusList');
    const countText = document.getElementById('countText');

    if (bookings.length === 0) {
        countText.textContent = '0 รายการ';
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                <div class="empty-title">ยังไม่มีรายการ</div>
                <div class="empty-sub">ยังไม่มีรายการจองที่อนุมัติหรือยืนยัน</div>
            </div>`;
        return;
    }

    countText.textContent = `${bookings.length} รายการ`;
    container.innerHTML = bookings.map((b, i) => {
        const isConfirmed = b.approvalStatus === 'Confirmed';
        const statusCls = isConfirmed ? 'confirmed' : 'approved';
        const statusTxt = isConfirmed
            ? '<span class="status-dot"></span> ยืนยันแล้ว'
            : '<span class="status-dot"></span> รออยืนยัน';
        const sd = formatDateTH(b.startDate), ed = formatDateTH(b.endDate);
        const ci = formatDateTH(b.checkin), co = formatDateTH(b.checkout);
        const hasAcc = b.accommodation === 'ต้องการ';
        const segments = Array.isArray(b.segments) ? b.segments : [];
        const segCount = segments.length;

        const segListHtml = segCount > 1 ? `
            <div class="seg-list">
                ${segments.map((s, idx) => `
                    <div class="seg-row">
                        <span class="seg-row-label"><span class="seg-row-num">${idx+1}</span>${s.room || '-'}</span>
                        <span class="seg-row-date">${formatDateTH(s.startDate)} – ${formatDateTH(s.endDate)}</span>
                    </div>`).join('')}
            </div>` : '';

        // Timeline: จอง(เสมอเสร็จ) -> อนุมัติ(เสมอเสร็จเพราะกรองมาแล้ว) -> ยืนยัน -> พร้อมใช้งาน
        const steps = [
            { label: 'จอง', done: true },
            { label: 'อนุมัติ', done: true },
            { label: 'ยืนยัน', done: isConfirmed, current: !isConfirmed },
            { label: 'พร้อมใช้งาน', done: false, current: isConfirmed }
        ];
        const timelineHtml = `
            <div class="timeline">
                ${steps.map(s => `
                    <div class="tl-step ${s.done ? 'done' : ''} ${s.current ? 'current' : ''}">
                        <div class="tl-line"></div>
                        <div class="tl-dot">${s.done ? '<i class="fas fa-check" style="font-size:0.6rem;"></i>' : ''}</div>
                        <div class="tl-label">${s.label}</div>
                    </div>`).join('')}
            </div>`;

        return `
        <div class="booking-card" id="card_${i}">
            <div class="booking-card-stripe ${statusCls}"></div>
            <div class="booking-card-body">
                <div class="card-top">
                    <span>
                        <span class="booking-id"><i class="fas fa-hashtag"></i>${b.bookingId}</span>
                        ${segCount > 1 ? `<span class="seg-count-chip"><i class="fas fa-layer-group"></i>${segCount} ช่วง</span>` : ''}
                    </span>
                    <span class="status-pill ${statusCls}">${statusTxt}</span>
                </div>
                <div class="course-name">${b.courseName || '-'}</div>
                <div class="meta-row">
                    <span class="meta-item"><i class="fas fa-calendar-range"></i>${sd} – ${ed}</span>
                    <span class="meta-item"><i class="fas fa-users"></i>${b.attendees} คน</span>
                    ${segCount <= 1 ? `<span class="meta-item"><i class="fas fa-door-open"></i>${b.room || '-'}</span>` : ''}
                    ${hasAcc ? `<span class="meta-item green"><i class="fas fa-bed"></i>พัก ${b.numRooms} ห้อง</span>` : ''}
                </div>
                ${segListHtml}
                ${timelineHtml}
                <span class="expand-btn" onclick="toggleExpand(${i})" id="btn_${i}">
                    <i class="fas fa-chevron-down" id="icon_${i}"></i> ดูรายละเอียด
                </span>
                <div class="card-detail">
                    <div class="detail-grid">
                        <div class="detail-row"><span class="detail-label">หน่วยงาน</span><span class="detail-value">${b.department || '-'}</span></div>
                        <div class="detail-row"><span class="detail-label">เบอร์โทร</span><span class="detail-value">${String(b.phone||'').replace("'","")}</span></div>
                        ${hasAcc ? `
                        <div class="detail-row"><span class="detail-label">Check-in</span><span class="detail-value">${ci}</span></div>
                        <div class="detail-row"><span class="detail-label">Check-out</span><span class="detail-value">${co}</span></div>
                        ${parseInt(b.viprooms||0)>0?`<div class="detail-row"><span class="detail-label">ห้อง VIP</span><span class="detail-value">${b.viprooms} ห้อง</span></div>`:''}
                        ` : `<div class="detail-row"><span class="detail-label">ที่พัก</span><span class="detail-value">ไม่ต้องการ</span></div>`}
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleExpand(i) {
    const card = document.getElementById(`card_${i}`);
    const icon = document.getElementById(`icon_${i}`);
    const btn = document.getElementById(`btn_${i}`);
    const isExpanded = card.classList.toggle('expanded');
    icon.className = isExpanded ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
    btn.innerHTML = `<i class="${isExpanded ? 'fas fa-chevron-up' : 'fas fa-chevron-down'}" id="icon_${i}"></i> ${isExpanded ? 'ย่อ' : 'ดูรายละเอียด'}`;
}

function formatDateTH(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}

init();
</script>
</body>
</html>
