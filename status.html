<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>สถานะการจอง ศฝฟ.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00B900;
            --secondary-color: #06C755;
            --accent: #FFB800;
            --success: #22c55e;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); line-height: 1.6;}
        
        .app-container { max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); padding-bottom:2rem; }

        /* === Header เหมือนหน้า Confirm === */
        .app-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 2.5rem 1.5rem 4rem;
            text-align: center; position: relative; overflow: hidden;
            border-radius: 0 0 30px 30px; box-shadow: var(--shadow);
        }
        .app-header::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        .header-icon {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); border-radius: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 1rem; position: relative; z-index: 1;
        }
        .header-icon i { font-size: 2rem; color: #ffffff; }
        .header-title { font-size: 1.75rem; font-weight: 700; color: #ffffff; position: relative; z-index: 1; }
        .header-subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.9); position: relative; z-index: 1; }
        .back-btn {
            position: absolute; top: 1.5rem; left: 1.5rem; color: #fff; text-decoration: none;
            display: flex; align-items: center; gap: 0.4rem; z-index: 2; font-weight: 600;
        }

        .content { padding:0 1rem; margin-top:-2.5rem; position:relative; z-index:3;}
        .section-card { background:var(--card); border-radius:20px; padding:1.5rem; box-shadow:var(--shadow); border:1px solid var(--border); }
        .section-title { font-size:1.15rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; justify-content: space-between;}
        .section-title i { color:var(--primary-color); }

        .status-card {
            background:#fff; border:1px solid var(--border); border-radius:16px;
            padding:1.25rem; margin-bottom:1rem; transition:all 0.2s;
        }
        .status-card:hover { border-color:var(--primary-color); box-shadow:var(--shadow); }
        .status-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem; }
        
        .booking-id-tag { background:rgba(0,185,0,0.1); color:var(--primary-color); font-size:0.8rem; font-weight:700; padding:0.25rem 0.75rem; border-radius:8px; }
        
        .status-pill { display:inline-flex; align-items:center; gap:0.3rem; padding:0.25rem 0.75rem; border-radius:20px; font-size:0.8rem; font-weight:700; }
        .status-pill.approved { background:rgba(255,184,0,0.15); color:#d97706; }
        .status-pill.confirmed { background:rgba(34,197,94,0.15); color:var(--success); }

        .status-course { font-size:1.05rem; font-weight:700; margin-bottom:0.5rem; }
        .status-meta { display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem; }
        .status-meta-item { font-size:0.85rem; color:var(--muted); display:flex; align-items:center; gap:0.4rem; }
        .status-meta-item i { color:var(--primary-color); width:16px; text-align:center; }

        .status-card-detail { display:none; margin-top:1rem; padding-top:1rem; border-top:1px dashed var(--border); }
        .status-card.expanded .status-card-detail { display:block; }
        .detail-row { display:flex; justify-content:space-between; padding:0.35rem 0; font-size:0.9rem; }
        .detail-label { color:var(--muted); }
        .detail-value { font-weight:600; text-align:right; }
        
        .expand-toggle { font-size:0.85rem; color:var(--primary-color); cursor:pointer; margin-top:0.75rem; display:inline-flex; align-items:center; gap:0.3rem; font-weight:600;}

        .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
        .empty-state i { font-size:3rem; color:var(--border); margin-bottom:1rem; display:block; }
        
        .skeleton { background:linear-gradient(90deg,#f0f0f0 25%,#f8f8f8 50%,#f0f0f0 75%); background-size:200%; animation:shimmer 1.5s infinite; border-radius:12px; height:120px; margin-bottom:1rem; }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> กลับ</a>
        <div class="header-icon"><i class="fas fa-search"></i></div>
        <div class="header-title">สถานะการจอง</div>
        <div class="header-subtitle">รายการที่อนุมัติและยืนยันแล้ว</div>
    </div>

    <div class="content">
        <div class="section-card">
            <div class="section-title">
                <div><i class="fas fa-list me-2"></i> รายการจองของคุณ</div>
                <span style="font-size:0.85rem; color:var(--muted); font-weight:400;" id="countText">กำลังโหลด...</span>
            </div>
            <div id="statusList">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </div>
    </div>
</div>

<script>
const LIFF_ID = "2007138631-Ono58j50";
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VAtdyxSMkPIIWNBAqUa9YJw2XNT7-fcPqbsSPqsk1IkrVex0X83DUMcGOmIdCJLPMw/exec";

function init() {
    const userId = sessionStorage.getItem('userId') || '';
    if (!userId) { window.location.href = 'index.html'; return; }
    loadStatus(userId);
}

async function loadStatus(userId) {
    try {
        const res = await fetch(`${GAS_URL}?action=getAllBookings&userId=${userId}`);
        const result = await res.json();
        const bookings = (result.bookings || []).filter(b => b.approvalStatus === 'Approved' || b.approvalStatus === 'Confirmed');
        renderStatus(bookings);
    } catch(e) {
        document.getElementById('statusList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>โหลดข้อมูลล้มเหลว</h5></div>`;
    }
}

function renderStatus(bookings) {
    const container = document.getElementById('statusList');
    const countText = document.getElementById('countText');
    
    if (bookings.length === 0) {
        countText.textContent = '0 รายการ';
        container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h5>ไม่มีรายการจอง</h5></div>`;
        return;
    }

    countText.textContent = `${bookings.length} รายการ`;
    container.innerHTML = bookings.map((b, i) => {
        const statusCls = b.approvalStatus === 'Confirmed' ? 'confirmed' : 'approved';
        const statusTxt = b.approvalStatus === 'Confirmed' ? '<i class="fas fa-check-double"></i> ยืนยันแล้ว' : '<i class="fas fa-clock"></i> รอการยืนยัน';
        const hasAcc = b.accommodation === 'ต้องการ';

        return `
        <div class="status-card" id="card_${i}">
            <div class="status-card-top">
                <span class="booking-id-tag"><i class="fas fa-hashtag"></i> ${b.bookingId}</span>
                <span class="status-pill ${statusCls}">${statusTxt}</span>
            </div>
            <div class="status-course">${b.courseName || 'ไม่ระบุชื่อหลักสูตร'}</div>
            <div class="status-meta">
                <span class="status-meta-item"><i class="fas fa-calendar"></i> ${formatDate(b.startDate)}</span>
                <span class="status-meta-item"><i class="fas fa-users"></i> ${b.attendees} คน</span>
                <span class="status-meta-item"><i class="fas fa-door-open"></i> ${b.room || '-'}</span>
                ${hasAcc ? `<span class="status-meta-item"><i class="fas fa-bed"></i> พัก ${b.numRooms} ห้อง</span>` : ''}
            </div>
            <div class="status-card-detail">
                <div class="detail-row"><span class="detail-label">หน่วยงาน</span><span class="detail-value">${b.department || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">เบอร์โทร</span><span class="detail-value">${String(b.phone||'').replace("'","")}</span></div>
                ${hasAcc ? `
                <div class="detail-row"><span class="detail-label">Check-in</span><span class="detail-value">${formatDate(b.checkin)}</span></div>
                <div class="detail-row"><span class="detail-label">Check-out</span><span class="detail-value">${formatDate(b.checkout)}</span></div>
                ${parseInt(b.viprooms||0)>0 ? `<div class="detail-row"><span class="detail-label">ห้อง VIP</span><span class="detail-value">${b.viprooms} ห้อง</span></div>`:''}
                ` : '<div class="detail-row"><span class="detail-label">ที่พัก</span><span class="detail-value">ไม่ต้องการ</span></div>'}
            </div>
            <div class="text-center">
                <span class="expand-toggle" onclick="toggleExpand(${i})">
                    <i class="fas fa-chevron-down" id="icon_${i}"></i> ดูรายละเอียด
                </span>
            </div>
        </div>`;
    }).join('');
}

function toggleExpand(i) {
    const card = document.getElementById(`card_${i}`);
    const icon = document.getElementById(`icon_${i}`);
    const isExpanded = card.classList.toggle('expanded');
    icon.className = isExpanded ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    return new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}

init();
</script>
</body>
</html>
