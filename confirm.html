<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ยืนยันการจองห้องประชุม ศฝฟ.</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
    :root {
        --primary-color: #00B900;
        --secondary-color: #06C755;
        --accent-color: #FFB800;
        --success-color: #22c55e;
        --danger-color: #FF334B;
        --background: #F8F9FA;
        --card-bg: #FFFFFF;
        --text-primary: #1A1A1A;
        --text-secondary: #6B7280;
        --border-color: #E5E7EB;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sarabun', sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; }
    .app-container { max-width: 480px; margin: 0 auto; background: var(--background); min-height: 100vh; position: relative; padding-bottom: 120px; }

    /* --- Header --- */
    .app-header { background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); padding: 2rem 1.5rem 4rem; text-align: center; position: relative; overflow: hidden; border-radius: 0 0 30px 30px; box-shadow: var(--shadow-lg); }
    .header-icon { width: 70px; height: 70px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem; position: relative; z-index: 1; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .header-icon i { font-size: 2rem; color: #ffffff; }
    .header-title { font-size: 1.75rem; font-weight: 700; color: #ffffff; margin-bottom: 0.5rem; position: relative; z-index: 1;}
    .header-subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.9); font-weight: 400; position: relative; z-index: 1;}

    .form-section { padding: 0 1rem 2rem; margin-top: -2.5rem; position: relative; z-index: 3; }
    .form-card { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); }
    .form-card-title { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .form-card-title i { color: var(--primary-color); font-size: 1.5rem; }
    .form-label { font-weight: 500; color: var(--text-primary); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .form-control, .form-select { border: 2px solid var(--border-color); border-radius: 12px; padding: 0.75rem 1rem; font-size: 0.95rem; background: #ffffff; }
    .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(0,185,0,0.1); outline: none; }
    .form-control:disabled { background-color: #f5f5f5; opacity: 0.7; }

    /* --- Booking List UI --- */
    .booking-list-card { background: #fff; border: 2px solid var(--border-color); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .booking-list-card:hover { border-color: var(--primary-color); transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .booking-id-badge { background: rgba(0,185,0,0.1); color: var(--primary-color); padding: 0.25rem 0.75rem; border-radius: 8px; font-weight: 700; font-size: 0.85rem; }
    
    /* --- Room Counter UI --- */
    .room-counter-section { background: linear-gradient(135deg, rgba(0,185,0,0.05), rgba(6,199,85,0.05)); border-radius: 16px; padding: 1.5rem; margin-top: 1rem; }
    .room-type-card { background: #ffffff; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 2px solid var(--border-color); }
    .room-type-card.vip-card { border-color: var(--accent-color); background: linear-gradient(135deg, rgba(255,184,0,0.05), rgba(255,184,0,0.1)); }
    .room-type-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .room-counter-controls { display: flex; align-items: center; gap: 1rem; }
    .counter-btn { width: 36px; height: 36px; border-radius: 10px; border: 2px solid var(--border-color); background: #ffffff; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .counter-btn:hover:not(:disabled) { background: var(--primary-color); color: #ffffff; border-color: var(--primary-color); }
    .counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .counter-value { font-size: 1.25rem; font-weight: 700; min-width: 40px; text-align: center; }

    /* --- Food Radio --- */
    .food-radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .food-radio-card input { display: none; }
    .food-radio-card label { display: flex; flex-direction: column; align-items: center; padding: 1.25rem 0.75rem; border: 2px solid var(--border-color); border-radius: 16px; cursor: pointer; background: #ffffff; transition: all 0.3s; }
    .food-radio-card input:checked + label { border-color: var(--primary-color); background: rgba(0,185,0,0.05); }

    /* --- File Upload UI --- */
    .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
    .file-upload-input { display: none; }
    .file-upload-label { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem; border: 2px dashed var(--border-color); border-radius: 12px; cursor: pointer; background: #ffffff; color: var(--text-secondary); font-weight: 500; }
    .file-upload-label:hover { border-color: var(--primary-color); background: rgba(0,185,0,0.05); color: var(--primary-color); }
    .file-name { margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); padding: 0.5rem; background: rgba(0,185,0,0.05); border-radius: 8px; display: none; }
    .file-name.show { display: block; }
    .required-badge { background: rgba(255,51,75,0.1); color: var(--danger-color); padding: 0.2rem 0.5rem; border-radius: 8px; font-size: 0.72rem; font-weight: 600; margin-left: 0.35rem; }

    .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #ffffff; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(0,185,0,0.3); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; flex-direction: column;}
    .loading-overlay.show { display: flex; }
    .loading-spinner { width: 50px; height: 50px; border: 4px solid rgba(0,185,0,0.2); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem;}
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-icon"><i class="fas fa-clipboard-check"></i></div>
            <div class="header-title">ยืนยันการจองห้องประชุม</div>
            <div class="header-subtitle">ศูนย์ฝึกปฏิบัติการไฟฟ้าแรงสูง การไฟฟ้าส่วนภูมิภาค</div>
        </div>

        <div class="form-section">
            
            <div id="selectionState">
                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-list-check"></i> รายการที่รอการยืนยัน</div>
                    <div id="bookingListContainer">
                        <div class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin me-2"></i>กำลังตรวจสอบข้อมูล...</div>
                    </div>
                </div>
            </div>

            <form id="confirmationForm" style="display: none;">
                <button type="button" class="btn btn-sm btn-light mb-3" onclick="showSelectionState()"><i class="fas fa-arrow-left me-1"></i> กลับไปหน้ารายการ</button>
                <input type="hidden" name="bookingId_confirm" id="bookingId_confirm">

                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-user"></i> ข้อมูลผู้จอง</div>
                    <div class="mb-3"><label class="form-label">ชื่อ-นามสกุล</label><input type="text" class="form-control" id="fullName" disabled></div>
                    <div class="mb-3"><label class="form-label">หน่วยงาน</label><input type="text" class="form-control" id="department" disabled></div>
                </div>

                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-calendar-alt"></i> ข้อมูลการจอง</div>
                    <div class="mb-3"><label class="form-label">ชื่อหลักสูตร/กิจกรรม <span class="text-danger">*</span></label><input type="text" class="form-control" id="courseName" required></div>
                    <div class="mb-3"><label class="form-label">จำนวนผู้เข้าร่วม <span class="text-danger">*</span></label><input type="number" class="form-control" id="attendees" min="1" required></div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">เริ่มประชุม</label><input type="date" class="form-control" id="startDate" disabled></div>
                        <div class="col-6 mb-3"><label class="form-label">สิ้นสุดประชุม</label><input type="date" class="form-control" id="endDate" disabled></div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">Check-in</label><input type="date" class="form-control" id="checkin" disabled></div>
                        <div class="col-6 mb-3"><label class="form-label">Check-out</label><input type="date" class="form-control" id="checkout" disabled></div>
                    </div>
                </div>

                <div class="form-card" id="accommodationSection">
                    <div class="form-card-title"><i class="fas fa-bed"></i> ข้อมูลห้องพัก</div>
                    <div class="room-counter-section">
                        <div class="room-type-card">
                            <div class="room-type-header"><div style="font-weight:600;"><i class="fas fa-door-open me-2"></i>ห้องพักมาตรฐาน</div></div>
                            <div class="room-counter-controls">
                                <button type="button" class="counter-btn" id="standardMinus" onclick="decreaseStandardRooms()">−</button>
                                <div class="counter-value" id="standardRoomsDisplay">0</div>
                                <button type="button" class="counter-btn" id="standardPlus" onclick="increaseStandardRooms()">+</button>
                            </div>
                        </div>
                        <div class="room-type-card vip-card">
                            <div class="room-type-header"><div style="font-weight:600; color:var(--accent-color);"><i class="fas fa-crown me-2"></i>ห้องพัก VIP</div></div>
                            <div class="room-counter-controls">
                                <button type="button" class="counter-btn" id="vipMinus" onclick="decreaseVipRooms()">−</button>
                                <div class="counter-value" id="vipRoomsDisplay">0</div>
                                <button type="button" class="counter-btn" id="vipPlus" onclick="increaseVipRooms()">+</button>
                            </div>
                        </div>
                        <input type="hidden" id="standardRooms"><input type="hidden" id="vipRooms">
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-utensils"></i> จองอาหารและอาหารว่าง</div>
                    <div class="food-radio-group">
                        <div class="food-radio-card">
                            <input type="radio" name="foodBooking" id="foodBookingYes" value="ต้องการ" onchange="onFoodBookingChange('ต้องการ')">
                            <label for="foodBookingYes"><div class="radio-card-icon"><i class="fas fa-utensils"></i></div><div style="font-weight:700;">ต้องการ</div></label>
                        </div>
                        <div class="food-radio-card">
                            <input type="radio" name="foodBooking" id="foodBookingNo" value="ไม่ต้องการ" onchange="onFoodBookingChange('ไม่ต้องการ')">
                            <label for="foodBookingNo"><div class="radio-card-icon"><i class="fas fa-times-circle"></i></div><div style="font-weight:700;">ไม่ต้องการ</div></label>
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-file-upload"></i> อัปโหลดเอกสาร</div>

                    <div class="file-upload-wrapper">
                        <input type="file" class="file-upload-input" id="approvalFile" accept=".pdf">
                        <label for="approvalFile" class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i><span>เอกสารอนุมัติ <span class="required-badge">PDF เท่านั้น</span></span>
                        </label>
                        <div class="file-name" id="approvalFileName"></div>
                    </div>

                    <div class="file-upload-wrapper">
                        <input type="file" class="file-upload-input" id="attendeeListFile" accept=".pdf,.xls,.xlsx">
                        <label for="attendeeListFile" class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i><span>รายชื่อผู้เข้าร่วม (PDF, Excel)</span>
                        </label>
                        <div class="file-name" id="attendeeListFileName"></div>
                    </div>

                    <div class="file-upload-wrapper" id="foodFileWrapper" style="display: none;">
                        <input type="file" class="file-upload-input" id="foodOrderFile" accept=".pdf,.xls,.xlsx">
                        <label for="foodOrderFile" class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i><span>รายการอาหาร <span class="required-badge">จำเป็น (PDF, Excel)</span></span>
                        </label>
                        <div class="file-name" id="foodOrderFileName"></div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-paper-plane me-2"></i>ยืนยันการจอง</button>
            </form>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div id="loadingText" style="font-weight: 600; color: var(--primary-color);">กำลังดำเนินการ...</div>
    </div>

    <script>
        const LIFF_ID = "2007138631-Ono58j50";
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VAtdyxSMkPIIWNBAqUa9YJw2XNT7-fcPqbsSPqsk1IkrVex0X83DUMcGOmIdCJLPMw/exec";

        const VIP_ROOMS_TOTAL = 9; // อัปเดตโควต้าใหม่
        let userBookings = [];
        let originalStandardRooms = 0;
        let currentStandardRooms = 0;
        let currentVipRooms = 0;
        let currentFoodBooking = '';

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                fetchApprovedBookings(profile.userId);
            } catch (err) {
                console.error('LIFF Error:', err);
                document.getElementById('bookingListContainer').innerHTML = `<div class="text-danger text-center mt-3"><i class="fas fa-exclamation-triangle"></i> ไม่สามารถเข้าสู่ระบบด้วย LINE ได้</div>`;
            }
        }

        async function fetchApprovedBookings(userId) {
            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?action=getApprovedBookings&userId=${userId}`);
                const result = await response.json();
                
                if (result.success) {
                    userBookings = result.bookings || [];
                    renderBookingList();
                } else {
                    throw new Error("Failed to load");
                }
            } catch (error) {
                document.getElementById('bookingListContainer').innerHTML = `<div class="text-danger text-center mt-3"><i class="fas fa-times-circle"></i> เกิดข้อผิดพลาดในการดึงข้อมูล</div>`;
            }
        }

        function renderBookingList() {
            const container = document.getElementById('bookingListContainer');
            if (userBookings.length === 0) {
                container.innerHTML = `<div class="text-center text-muted py-4"><i class="fas fa-inbox fa-3x mb-3 d-block" style="color:var(--border-color);"></i>ไม่มีรายการจองที่รอการยืนยัน</div>`;
                return;
            }

            container.innerHTML = userBookings.map((b, index) => `
                <div class="booking-list-card" onclick="selectBooking(${index})">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="booking-id-badge">${b.bookingId}</span>
                        <span class="text-muted" style="font-size:0.8rem;"><i class="fas fa-calendar-day me-1"></i>${b.startDate}</span>
                    </div>
                    <div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 0.25rem;">${b.courseName || '-'}</div>
                    <div class="text-muted" style="font-size: 0.85rem;"><i class="fas fa-users me-1"></i>${b.attendees} คน | <i class="fas fa-door-open me-1"></i>${b.room}</div>
                </div>
            `).join('');
        }

        function selectBooking(index) {
            const data = userBookings[index];
            document.getElementById('selectionState').style.display = 'none';
            document.getElementById('confirmationForm').style.display = 'block';

            document.getElementById('bookingId_confirm').value = data.bookingId;
            document.getElementById('fullName').value = data.fullName;
            document.getElementById('department').value = data.department;
            document.getElementById('courseName').value = data.courseName;
            document.getElementById('attendees').value = data.attendees;
            document.getElementById('startDate').value = data.startDate;
            document.getElementById('endDate').value = data.endDate;
            
            if(data.checkin) document.getElementById('checkin').value = data.checkin;
            if(data.checkout) document.getElementById('checkout').value = data.checkout;

            originalStandardRooms = parseInt(data.numRooms) || 0;
            currentStandardRooms = originalStandardRooms;
            currentVipRooms = parseInt(data.viprooms) || 0;
            
            if (currentVipRooms > 0) currentStandardRooms = originalStandardRooms - currentVipRooms;
            if (originalStandardRooms === 0 && currentVipRooms === 0) {
                document.getElementById('accommodationSection').style.display = 'none';
            } else {
                document.getElementById('accommodationSection').style.display = 'block';
                updateRoomDisplay();
            }
        }

        function showSelectionState() {
            document.getElementById('confirmationForm').style.display = 'none';
            document.getElementById('selectionState').style.display = 'block';
        }

        // Room Counters Logic
        function updateRoomDisplay() {
            document.getElementById('standardRoomsDisplay').textContent = currentStandardRooms;
            document.getElementById('vipRoomsDisplay').textContent = currentVipRooms;
            document.getElementById('standardRooms').value = currentStandardRooms;
            document.getElementById('vipRooms').value = currentVipRooms;
            
            document.getElementById('vipMinus').disabled = currentVipRooms <= 0;
            document.getElementById('standardMinus').disabled = currentStandardRooms <= 0;
            
            const maxTotal = originalStandardRooms;
            document.getElementById('vipPlus').disabled = (currentStandardRooms + currentVipRooms) >= maxTotal && currentStandardRooms === 0;
            document.getElementById('standardPlus').disabled = (currentStandardRooms + currentVipRooms) >= maxTotal && currentVipRooms === 0;
        }

        function increaseStandardRooms() {
            if ((currentStandardRooms + currentVipRooms) < originalStandardRooms) { currentStandardRooms++; }
            else if (currentVipRooms > 0) { currentVipRooms--; currentStandardRooms++; }
            updateRoomDisplay();
        }
        function decreaseStandardRooms() { if (currentStandardRooms > 0) { currentStandardRooms--; updateRoomDisplay(); } }
        function increaseVipRooms() {
            if (currentVipRooms >= VIP_ROOMS_TOTAL) {
                Swal.fire('โควต้าเต็ม', `ไม่สามารถจองห้อง VIP เกิน ${VIP_ROOMS_TOTAL} ห้องต่อวันได้`, 'warning'); return;
            }
            if ((currentStandardRooms + currentVipRooms) < originalStandardRooms) { currentVipRooms++; }
            else if (currentStandardRooms > 0) { currentStandardRooms--; currentVipRooms++; }
            updateRoomDisplay();
        }
        function decreaseVipRooms() { if (currentVipRooms > 0) { currentVipRooms--; currentStandardRooms++; updateRoomDisplay(); } }

        // Food Booking Logic
        function onFoodBookingChange(value) {
            currentFoodBooking = value;
            document.getElementById('foodFileWrapper').style.display = value === 'ต้องการ' ? 'block' : 'none';
            if (value !== 'ต้องการ') document.getElementById('foodOrderFile').value = '';
        }

        // File Display Name
        ['approvalFile', 'attendeeListFile', 'foodOrderFile'].forEach(id => {
            document.getElementById(id).addEventListener('change', e => {
                const nameDiv = document.getElementById(id + 'Name');
                if (e.target.files[0]) { nameDiv.textContent = '📄 ' + e.target.files[0].name; nameDiv.classList.add('show'); }
                else { nameDiv.classList.remove('show'); }
            });
        });

        // Submit Form
        document.getElementById('confirmationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!currentFoodBooking) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกว่าต้องการจองอาหารหรือไม่', 'warning'); return;
            }

            const approvalFile = document.getElementById('approvalFile');
            const foodOrderFile = document.getElementById('foodOrderFile');

            if (approvalFile.files.length === 0) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาแนบเอกสารอนุมัติ (PDF)', 'warning'); return;
            }
            if (currentFoodBooking === 'ต้องการ' && foodOrderFile.files.length === 0) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาแนบรายการอาหารและอาหารว่าง', 'warning'); return;
            }

            const loading = document.getElementById('loading');
            loading.classList.add('show');

            try {
                const payload = {
                    bookingId_confirm: document.getElementById('bookingId_confirm').value,
                    courseName: document.getElementById('courseName').value,
                    attendees: document.getElementById('attendees').value,
                    standardRooms: currentStandardRooms,
                    vipRooms: currentVipRooms,
                    foodBooking: currentFoodBooking,
                    approvalFile: await readFileAsBase64(approvalFile.files[0]),
                    attendeeListFile: await readFileAsBase64(document.getElementById('attendeeListFile').files[0]),
                    foodOrderFile: await readFileAsBase64(foodOrderFile.files[0])
                };

                google.script.run
                    .withSuccessHandler(res => {
                        loading.classList.remove('show');
                        if (res.status === 'success') {
                            Swal.fire({ title: 'สำเร็จ!', text: 'ยืนยันการจองเรียบร้อยแล้ว', icon: 'success', allowOutsideClick: false }).then(() => {
                                // ปิดหน้าต่างด้วย window.close() ป้องกันปัญหา liff closeWindow ทำงานผิดพลาด
                                window.close(); 
                                if (typeof google !== 'undefined' && google.script) google.script.host.close();
                            });
                        } else {
                            Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        loading.classList.remove('show');
                        Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
                    })
                    .handleSubmitConfirmationFromHtml(payload);
            } catch (err) {
                loading.classList.remove('show');
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถอ่านไฟล์ได้', 'error');
            }
        });

        function readFileAsBase64(file) {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = e => resolve({ base64: e.target.result.split(',')[1], mimeType: file.type, fileName: file.name });
                reader.readAsDataURL(file);
            });
        }

        initializeLiff();
    </script>
</body>
</html>
