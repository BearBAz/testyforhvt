<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ยืนยันการจองห้องประชุม ศฝฟ.</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
    :root {
        --primary-color: #00B900;
        --secondary-color: #06C755;
        --accent-color: #FFB800;
        --success-color: #22c55e;
        --danger-color: #FF334B;
        --background: #F8F9FA;
        --card-bg: #FFFFFF;
        --text-primary: #1A1A1A;
        --text-secondary: #6B7280;
        --border-color: #E5E7EB;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Sarabun', sans-serif;
        background: var(--background);
        color: var(--text-primary);
        line-height: 1.6;
        padding-bottom: 0;
    }

    .app-container {
        max-width: 480px;
        margin: 0 auto;
        background: var(--background);
        min-height: 100vh;
        position: relative;
        padding-bottom: 120px;
    }

    /* === Header (ตรงกับทุกหน้า) === */
    .app-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        padding: 2.5rem 1.5rem 4rem;
        text-align: center;
        position: relative;
        overflow: hidden;
        border-radius: 0 0 30px 30px;
        box-shadow: var(--shadow-lg);
    }

    .app-header::before {
        content: ''; position: absolute; top: -50px; right: -50px;
        width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%;
    }

    .header-icon {
        width: 70px; height: 70px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 1rem; position: relative; z-index: 1;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .header-icon i { font-size: 2rem; color: #ffffff; }
    .header-title { font-size: 1.75rem; font-weight: 700; color: #ffffff; margin-bottom: 0.25rem; position: relative; z-index: 1;}
    .header-subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.9); font-weight: 400; position: relative; z-index: 1;}

    .form-section {
        padding: 0 1rem 2rem;
        margin-top: -2.5rem;
        position: relative;
        z-index: 3;
    }

    .form-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
    }

    .form-card-title {
        font-size: 1.15rem; font-weight: 600; margin-bottom: 1.25rem;
        display: flex; align-items: center; gap: 0.5rem;
    }

    .form-card-title i { color: var(--primary-color); font-size: 1.25rem; }
    .form-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.5rem; }
    
    .form-control, .form-select {
        border: 2px solid var(--border-color);
        border-radius: 12px; padding: 0.75rem 1rem;
        background: #ffffff; transition: all 0.3s;
    }

    .form-control:focus, .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(0,185,0,0.1); outline: none;
    }

    .form-control:disabled { background-color: #f5f5f5; opacity: 0.8; }

    /* === Booking Selection Cards === */
    .booking-select-card {
        background: #fff;
        border: 2px solid var(--border-color);
        border-radius: 16px;
        padding: 1.25rem;
        margin-bottom: 1rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .booking-select-card:hover {
        border-color: var(--primary-color);
        background: rgba(0,185,0,0.03);
        transform: translateY(-2px);
    }
    .booking-id-tag {
        background: rgba(0,185,0,0.1);
        color: var(--primary-color);
        padding: 0.2rem 0.6rem;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 700;
    }

    /* === Buttons === */
    .submit-btn {
        width: 100%; padding: 1rem;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        color: #ffffff; border: none; border-radius: 16px;
        font-size: 1.1rem; font-weight: 600; cursor: pointer;
        box-shadow: 0 4px 12px rgba(0,185,0,0.3);
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-to-list-btn {
        background: none; border: none; color: var(--text-secondary);
        font-size: 0.95rem; font-weight: 600; padding: 0.5rem 0;
        margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 0.4rem;
    }

    /* === File Upload & Styling === */
    .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
    .file-upload-input { display: none; }
    .file-upload-label {
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 1rem; border: 2px dashed var(--border-color); border-radius: 12px;
        cursor: pointer; background: #ffffff; font-weight: 500; color: var(--text-secondary);
    }
    .file-upload-label:hover { border-color: var(--primary-color); background: rgba(0,185,0,0.05); color: var(--primary-color); }
    .file-name {
        margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);
        padding: 0.5rem; background: rgba(0,185,0,0.05); border-radius: 8px; display: none;
    }
    .file-name.show { display: block; }
    .required-badge {
        background: rgba(255,51,75,0.1); color: var(--danger-color);
        padding: 0.2rem 0.5rem; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
    }

    /* === Food Options === */
    .food-radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .food-radio-card label {
        display: flex; flex-direction: column; align-items: center; padding: 1.25rem 0.75rem;
        border: 2px solid var(--border-color); border-radius: 16px; cursor: pointer; background: #ffffff;
    }
    .food-radio-card input:checked + label { border-color: var(--primary-color); background: rgba(0,185,0,0.05); }
    .food-radio-card input { display: none; }
    .radio-card-icon { font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .food-radio-card input:checked + label .radio-card-icon { color: var(--primary-color); }

    /* === Loading Overlay === */
    .loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.9); backdrop-filter: blur(5px);
        display: none; align-items: center; justify-content: center; z-index: 9999; flex-direction: column;
    }
    .loading-overlay.show { display: flex; }
    .loading-spinner {
        width: 50px; height: 50px; border: 4px solid rgba(0,185,0,0.2);
        border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === Room Counters === */
    .room-counter-section { background: rgba(0,185,0,0.03); border-radius: 16px; padding: 1.5rem; margin-top: 1rem; }
    .room-type-card { background: #ffffff; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 2px solid var(--border-color); }
    .room-type-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .counter-btn { width: 36px; height: 36px; border-radius: 10px; border: 2px solid var(--border-color); background: #ffffff; font-weight: 600; cursor: pointer; }
    .counter-btn:hover:not(:disabled) { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
    .counter-value { font-size: 1.25rem; font-weight: 700; min-width: 40px; text-align: center; }
    .room-counter-controls { display: flex; align-items: center; gap: 1rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-icon"><i class="fas fa-clipboard-check"></i></div>
            <div class="header-title">ยืนยันการจอง</div>
            <div class="header-subtitle">ศูนย์ฝึกปฏิบัติการไฟฟ้าแรงสูง (ศฝฟ.)</div>
        </div>

        <div class="form-section">
            
            <div id="selectionState">
                <div class="form-card">
                    <div class="form-card-title"><i class="fas fa-list"></i> รายการที่รอการยืนยัน</div>
                    <div id="bookingListContainer">
                        <div class="text-center text-muted my-4"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</div>
                    </div>
                </div>
            </div>

            <div id="formState" style="display: none;">
                <button type="button" class="back-to-list-btn" onclick="showSelectionState()">
                    <i class="fas fa-arrow-left"></i> กลับไปหน้ารายการ
                </button>

                <form id="confirmationForm">
                    <input type="hidden" name="bookingId_confirm" id="bookingId_confirm">

                    <div class="form-card">
                        <div class="form-card-title"><i class="fas fa-user"></i> ข้อมูลผู้จอง</div>
                        <div class="mb-3"><label class="form-label">ชื่อ-นามสกุล</label><input type="text" class="form-control" id="fullName" disabled></div>
                        <div class="mb-3"><label class="form-label">หน่วยงาน</label><input type="text" class="form-control" id="department" disabled></div>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title"><i class="fas fa-calendar-alt"></i> ข้อมูลการจอง</div>
                        <div class="mb-3"><label class="form-label">ชื่อหลักสูตร/กิจกรรม <span class="text-danger">*</span></label><input type="text" class="form-control" id="courseName" required></div>
                        <div class="mb-3"><label class="form-label">จำนวนผู้เข้าร่วม <span class="text-danger">*</span></label><input type="number" class="form-control" id="attendees" required min="1"></div>
                        <div class="row">
                            <div class="col-6 mb-3"><label class="form-label">วันที่เริ่ม</label><input type="date" class="form-control" id="startDate" disabled></div>
                            <div class="col-6 mb-3"><label class="form-label">วันที่สิ้นสุด</label><input type="date" class="form-control" id="endDate" disabled></div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3"><label class="form-label">Check-in</label><input type="date" class="form-control" id="checkin" disabled></div>
                            <div class="col-6 mb-3"><label class="form-label">Check-out</label><input type="date" class="form-control" id="checkout" disabled></div>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title"><i class="fas fa-bed"></i> ข้อมูลห้องพัก</div>
                        <div class="room-counter-section">
                            <div class="room-type-card">
                                <div class="room-type-header"><div style="font-weight:600;"><i class="fas fa-door-open me-2"></i>ห้องพักมาตรฐาน</div></div>
                                <div class="room-counter-controls">
                                    <button type="button" class="counter-btn" id="standardMinus" onclick="decreaseStandardRooms()">−</button>
                                    <div class="counter-value" id="standardRoomsDisplay">0</div>
                                    <button type="button" class="counter-btn" id="standardPlus" onclick="increaseStandardRooms()">+</button>
                                </div>
                            </div>
                            <div class="room-type-card">
                                <div class="room-type-header"><div style="font-weight:600; color:var(--accent-color);"><i class="fas fa-crown me-2"></i>ห้องพัก VIP</div></div>
                                <div class="room-counter-controls">
                                    <button type="button" class="counter-btn" id="vipMinus" onclick="decreaseVipRooms()">−</button>
                                    <div class="counter-value" id="vipRoomsDisplay">0</div>
                                    <button type="button" class="counter-btn" id="vipPlus" onclick="increaseVipRooms()">+</button>
                                </div>
                            </div>
                            <input type="hidden" name="standardRooms" id="standardRooms">
                            <input type="hidden" name="vipRooms" id="vipRooms">
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title"><i class="fas fa-utensils"></i> จองอาหารและอาหารว่าง</div>
                        <div class="food-radio-group">
                            <div class="food-radio-card">
                                <input type="radio" name="foodBooking" id="foodYes" value="ต้องการ" onchange="onFoodChange('ต้องการ')">
                                <label for="foodYes"><div class="radio-card-icon"><i class="fas fa-utensils"></i></div><div style="font-weight:600;">ต้องการ</div></label>
                            </div>
                            <div class="food-radio-card">
                                <input type="radio" name="foodBooking" id="foodNo" value="ไม่ต้องการ" onchange="onFoodChange('ไม่ต้องการ')">
                                <label for="foodNo"><div class="radio-card-icon"><i class="fas fa-times-circle"></i></div><div style="font-weight:600;">ไม่ต้องการ</div></label>
                            </div>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="form-card-title"><i class="fas fa-file-upload"></i> อัปโหลดเอกสาร</div>
                        
                        <div class="file-upload-wrapper">
                            <input type="file" class="file-upload-input" id="approvalFile" accept=".pdf">
                            <label for="approvalFile" class="file-upload-label"><i class="fas fa-cloud-upload-alt"></i><span>เอกสารอนุมัติ <span class="required-badge">จำเป็น (PDF เท่านั้น)</span></span></label>
                            <div class="file-name" id="approvalFileName"></div>
                        </div>

                        <div class="file-upload-wrapper">
                            <input type="file" class="file-upload-input" id="attendeeListFile" accept=".pdf,.xls,.xlsx">
                            <label for="attendeeListFile" class="file-upload-label"><i class="fas fa-cloud-upload-alt"></i><span>รายชื่อผู้เข้าร่วม (PDF, Excel)</span></label>
                            <div class="file-name" id="attendeeListFileName"></div>
                        </div>

                        <div class="file-upload-wrapper" id="foodFileWrapper" style="display:none;">
                            <input type="file" class="file-upload-input" id="foodOrderFile" accept=".pdf,.xls,.xlsx">
                            <label for="foodOrderFile" class="file-upload-label"><i class="fas fa-cloud-upload-alt"></i><span>รายการอาหาร <span class="required-badge">จำเป็น (PDF, Excel)</span></span></label>
                            <div class="file-name" id="foodOrderFileName"></div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-paper-plane"></i> ยืนยันการจอง</button>
                </form>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div id="loadingText" style="font-weight:600; color:var(--primary-color);">กำลังโหลด...</div>
    </div>

    <script>
        const LIFF_ID = "2007138631-Ono58j50";
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VAtdyxSMkPIIWNBAqUa9YJw2XNT7-fcPqbsSPqsk1IkrVex0X83DUMcGOmIdCJLPMw/exec";
        
        let allBookings = [];
        let originalStandardRooms = 0;
        let currentStandardRooms = 0;
        let currentVipRooms = 0;
        let currentFoodBooking = '';

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                fetchApprovedBookings(profile.userId);
            } catch (err) {
                console.error(err);
                document.getElementById('bookingListContainer').innerHTML = `<div class="text-danger text-center"><i class="fas fa-exclamation-triangle"></i> เชื่อมต่อ LINE ไม่สำเร็จ</div>`;
            }
        }

        async function fetchApprovedBookings(userId) {
            try {
                const res = await fetch(`${GAS_URL}?action=getApprovedBookings&userId=${userId}`);
                const data = await res.json();
                
                if (data.success) {
                    allBookings = data.bookings.filter(b => b.approvalStatus === 'Approved');
                    renderBookingList();
                } else {
                    throw new Error("Failed to fetch");
                }
            } catch (e) {
                document.getElementById('bookingListContainer').innerHTML = `<div class="text-danger text-center">โหลดข้อมูลล้มเหลว กรุณาลองใหม่</div>`;
            }
        }

        function renderBookingList() {
            const container = document.getElementById('bookingListContainer');
            if (allBookings.length === 0) {
                container.innerHTML = `<div class="text-center text-muted my-4"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>ไม่มีรายการที่รอการยืนยัน</div>`;
                return;
            }

            container.innerHTML = allBookings.map((b, index) => `
                <div class="booking-select-card" onclick="selectBooking(${index})">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="booking-id-tag"><i class="fas fa-hashtag"></i> ${b.bookingId}</span>
                        <span class="text-muted" style="font-size:0.8rem;">${new Date(b.startDate).toLocaleDateString('th-TH')}</span>
                    </div>
                    <div style="font-weight:600;">${b.courseName || 'ไม่ระบุชื่อหลักสูตร'}</div>
                    <div class="text-muted mt-1" style="font-size:0.85rem;"><i class="fas fa-users"></i> ${b.attendees} คน | <i class="fas fa-door-open"></i> ${b.room}</div>
                </div>
            `).join('');
        }

        function selectBooking(index) {
            const data = allBookings[index];
            document.getElementById('selectionState').style.display = 'none';
            document.getElementById('formState').style.display = 'block';

            document.getElementById('bookingId_confirm').value = data.bookingId;
            document.getElementById('fullName').value = data.fullName;
            document.getElementById('department').value = data.department;
            document.getElementById('courseName').value = data.courseName;
            document.getElementById('attendees').value = data.attendees;
            document.getElementById('startDate').value = data.startDate.split('T')[0];
            document.getElementById('endDate').value = data.endDate.split('T')[0];
            document.getElementById('checkin').value = data.checkin ? data.checkin.split('T')[0] : '';
            document.getElementById('checkout').value = data.checkout ? data.checkout.split('T')[0] : '';

            originalStandardRooms = parseInt(data.numRooms) || 0;
            currentStandardRooms = originalStandardRooms;
            currentVipRooms = parseInt(data.viprooms) || 0;
            if (currentVipRooms > 0) currentStandardRooms = originalStandardRooms - currentVipRooms;
            updateRoomDisplay();
        }

        function showSelectionState() {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('selectionState').style.display = 'block';
        }

        // Room Controls
        function updateRoomDisplay() {
            document.getElementById('standardRoomsDisplay').textContent = currentStandardRooms;
            document.getElementById('vipRoomsDisplay').textContent = currentVipRooms;
            document.getElementById('standardRooms').value = currentStandardRooms;
            document.getElementById('vipRooms').value = currentVipRooms;
            
            document.getElementById('vipMinus').disabled = currentVipRooms <= 0;
            document.getElementById('standardMinus').disabled = currentStandardRooms <= 0;
        }

        function increaseStandardRooms() {
            if ((currentStandardRooms + currentVipRooms) < originalStandardRooms) { currentStandardRooms++; updateRoomDisplay(); }
            else if (currentVipRooms > 0) { currentVipRooms--; currentStandardRooms++; updateRoomDisplay(); }
        }
        function decreaseStandardRooms() { if (currentStandardRooms > 0) { currentStandardRooms--; updateRoomDisplay(); } }
        function increaseVipRooms() {
            if ((currentStandardRooms + currentVipRooms) < originalStandardRooms) { currentVipRooms++; updateRoomDisplay(); }
            else if (currentStandardRooms > 0) { currentStandardRooms--; currentVipRooms++; updateRoomDisplay(); }
        }
        function decreaseVipRooms() { if (currentVipRooms > 0) { currentVipRooms--; currentStandardRooms++; updateRoomDisplay(); } }

        // Food Toggle
        function onFoodChange(val) {
            currentFoodBooking = val;
            document.getElementById('foodFileWrapper').style.display = val === 'ต้องการ' ? 'block' : 'none';
        }

        // File displays
        ['approvalFile', 'attendeeListFile', 'foodOrderFile'].forEach(id => {
            document.getElementById(id).addEventListener('change', e => {
                const nameDiv = document.getElementById(id + 'Name');
                if (e.target.files[0]) { nameDiv.textContent = '📄 ' + e.target.files[0].name; nameDiv.classList.add('show'); }
                else { nameDiv.classList.remove('show'); }
            });
        });

        function readFileAsBase64(file) {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = e => resolve({ base64: e.target.result.split(',')[1], mimeType: file.type, fileName: file.name });
                reader.readAsDataURL(file);
            });
        }

        // Submit
        document.getElementById('confirmationForm').addEventListener('submit', async e => {
            e.preventDefault();
            const approvalFile = document.getElementById('approvalFile');
            const foodOrderFile = document.getElementById('foodOrderFile');

            if (approvalFile.files.length === 0) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาแนบเอกสารอนุมัติ (PDF)', 'warning');
            if (currentFoodBooking === 'ต้องการ' && foodOrderFile.files.length === 0) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาแนบรายการอาหาร', 'warning');

            const loading = document.getElementById('loading');
            loading.classList.add('show');
            document.getElementById('loadingText').textContent = 'กำลังส่งข้อมูล...';

            try {
                const payload = {
                    bookingId_confirm: document.getElementById('bookingId_confirm').value,
                    courseName: document.getElementById('courseName').value,
                    attendees: document.getElementById('attendees').value,
                    standardRooms: currentStandardRooms,
                    vipRooms: currentVipRooms,
                    foodBooking: currentFoodBooking,
                    approvalFile: await readFileAsBase64(approvalFile.files[0]),
                    attendeeListFile: await readFileAsBase64(document.getElementById('attendeeListFile').files[0]),
                    foodOrderFile: await readFileAsBase64(foodOrderFile.files[0])
                };

                google.script.run.withSuccessHandler(() => {
                    loading.classList.remove('show');
                    Swal.fire({
                        title: 'สำเร็จ', text: 'ยืนยันการจองเรียบร้อย', icon: 'success', allowOutsideClick: false
                    }).then(() => {
                        // ไม่ใช้ liff.closeWindow() ตาม Requirement ใน Ledger เพื่อแก้ปัญหา
                        window.close();
                        if (window.google?.script) google.script.host.close();
                    });
                }).withFailureHandler(err => {
                    loading.classList.remove('show');
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                }).handleSubmitConfirmationFromHtml(payload);
            } catch (err) {
                loading.classList.remove('show');
                Swal.fire('ข้อผิดพลาด', err.message, 'error');
            }
        });

        initLiff();
    </script>
</body>
</html>
