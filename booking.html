<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>จองห้องประชุม ศฝฟ.</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #7061bd;
            --brand-dark: #5649a0;
            --brand-deeper: #3d3480;
            --brand-light: #9585d4;
            --brand-soft: #f0eeff;
            --brand-xsoft: #f8f7ff;
            --gold: #f5a623;
            --gold-dark: #d4891a;
            --gold-soft: #fff8ed;
            --teal: #00b8a9;
            --teal-soft: #e6f9f8;
            --red: #f04f5f;
            --red-soft: #fef0f1;
            --green: #00c08b;
            --green-soft: #e5f9f4;
            --bg: #f5f4fc;
            --surface: #ffffff;
            --text: #1a1535;
            --text-2: #4a4469;
            --muted: #9490b8;
            --border: #e5e3f5;
            --border-strong: #ccc9e8;
            --shadow-xs: 0 1px 3px rgba(112,97,189,0.08);
            --shadow-sm: 0 2px 8px rgba(112,97,189,0.10);
            --shadow-md: 0 6px 20px rgba(112,97,189,0.13);
            --shadow-lg: 0 16px 48px rgba(112,97,189,0.16);
            --r-sm: 12px; --r-md: 16px; --r-lg: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'IBM Plex Sans Thai','Noto Sans Thai',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
        .app-container { max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; }

        /* ── PAGE HEADER ── */
        .page-header {
            background: linear-gradient(145deg, #7061bd 0%, #5649a0 50%, #3d3480 100%);
            padding: 0; position: relative; overflow: hidden;
        }
        .header-bg-grid {
            position: absolute; inset: 0; opacity: 0.05;
            background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .header-orb {
            position: absolute; top: -60px; right: -50px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 65%);
            border-radius: 50%;
        }
        .header-inner { position: relative; z-index: 2; padding: 1.6rem 1.25rem 4.5rem; }
        .back-link {
            display: inline-flex; align-items: center; gap: 0.45rem;
            color: rgba(255,255,255,0.8); font-size: 0.82rem; text-decoration: none;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 0.3rem 0.8rem; margin-bottom: 1.25rem;
            transition: all 0.2s;
        }
        .back-link:hover { color: #fff; background: rgba(255,255,255,0.18); }
        .header-title-row { display: flex; align-items: center; gap: 0.9rem; }
        .header-icon-box {
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .header-icon-box i { font-size: 1.5rem; color: #fff; }
        .header-text-group { flex: 1; }
        .page-title { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -0.4px; line-height: 1.15; }
        .page-subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.65); margin-top: 0.25rem; }

        /* ── PROGRESS STEPS ── */
        .form-area { padding: 0 0.9rem 3rem; margin-top: -3rem; position: relative; z-index: 3; }
        .steps-bar {
            background: var(--surface); border-radius: var(--r-lg);
            padding: 1.1rem 1rem; margin-bottom: 1rem;
            box-shadow: var(--shadow-md); border: 1px solid var(--border);
            position: relative;
        }
        .steps-track {
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .steps-line {
            position: absolute; top: 21px; left: 16.66%; right: 16.66%;
            height: 2px; background: var(--border); border-radius: 4px; z-index: 0;
        }
        .steps-line-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, var(--brand), var(--brand-light));
            border-radius: 4px; width: 0%; transition: width 0.5s ease;
        }
        .step { flex: 1; text-align: center; position: relative; z-index: 1; }
        .step-bubble {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--bg); border: 2px solid var(--border);
            color: var(--muted); font-weight: 700; font-size: 0.9rem;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 0.45rem;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        .step.active .step-bubble {
            background: var(--brand); border-color: var(--brand); color: #fff;
            transform: scale(1.1); box-shadow: 0 0 0 5px rgba(112,97,189,0.15);
        }
        .step.done .step-bubble { background: var(--green); border-color: var(--green); color: #fff; }
        .step-name { font-size: 0.7rem; color: var(--muted); font-weight: 500; }
        .step.active .step-name { color: var(--brand); font-weight: 700; }
        .step.done .step-name { color: var(--green); }

        /* ── FORM CARDS ── */
        .form-card {
            background: var(--surface); border-radius: var(--r-lg);
            padding: 1.35rem 1.25rem; margin-bottom: 0.9rem;
            box-shadow: var(--shadow-xs); border: 1px solid var(--border);
            animation: cardUp 0.4s ease-out;
        }
        @keyframes cardUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

        .card-head {
            display: flex; align-items: center; gap: 0.7rem;
            margin-bottom: 1.2rem; padding-bottom: 0.85rem;
            border-bottom: 1.5px solid var(--border);
        }
        .card-head-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--brand-soft); display: flex; align-items: center; justify-content: center;
        }
        .card-head-icon i { font-size: 0.95rem; color: var(--brand); }
        .card-head-title { font-size: 0.98rem; font-weight: 700; color: var(--text); }

        /* ── FORM ELEMENTS ── */
        .form-grp { margin-bottom: 1rem; }
        .form-grp:last-child { margin-bottom: 0; }
        .f-label {
            display: block; font-size: 0.82rem; font-weight: 600;
            color: var(--text-2); margin-bottom: 0.4rem;
        }
        .f-label .req { color: var(--red); margin-left: 2px; }
        .f-input, .f-select {
            width: 100%; border: 1.5px solid var(--border);
            border-radius: var(--r-sm); padding: 0.78rem 1rem;
            font-size: 0.92rem; font-family: inherit;
            color: var(--text); background: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }
        .f-input:focus, .f-select:focus {
            border-color: var(--brand); outline: none;
            box-shadow: 0 0 0 3px rgba(112,97,189,0.12);
        }
        .f-input:disabled { background: var(--bg); color: var(--muted); }
        .f-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        /* Custom dropdown */
        .dropdown-wrap { position: relative; }
        .dropdown-trigger {
            width: 100%; border: 1.5px solid var(--border);
            border-radius: var(--r-sm); padding: 0.78rem 1rem;
            font-size: 0.92rem; font-family: inherit;
            color: var(--text); background: var(--surface);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; min-height: 50px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .dropdown-trigger.open {
            border-color: var(--brand); box-shadow: 0 0 0 3px rgba(112,97,189,0.12);
        }
        .dropdown-placeholder { color: var(--muted); }
        .dropdown-caret { color: var(--muted); font-size: 0.8rem; transition: transform 0.25s; }
        .dropdown-trigger.open .dropdown-caret { transform: rotate(180deg); color: var(--brand); }
        .dropdown-panel {
            display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--r-md); box-shadow: var(--shadow-lg);
            z-index: 200; max-height: 290px; overflow-y: auto;
            padding: 0.5rem; list-style: none;
            animation: dropIn 0.22s ease;
        }
        @keyframes dropIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
        .dropdown-panel.open { display: block; }
        .drop-option {
            padding: 0.8rem 0.9rem; border-radius: var(--r-sm); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.15s; margin-bottom: 2px;
        }
        .drop-option:last-child { margin-bottom: 0; }
        .drop-option:hover { background: var(--brand-soft); }
        .drop-option.unavailable { opacity: 0.4; cursor: not-allowed; background: var(--bg); }
        .opt-left { min-width: 0; }
        .opt-name { font-weight: 600; color: var(--text); font-size: 0.9rem; }
        .opt-cap { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
        .avail-chip {
            font-size: 0.7rem; font-weight: 700; padding: 0.18rem 0.5rem;
            border-radius: 20px; flex-shrink: 0; margin-left: 0.5rem;
        }
        .avail-chip.ok { background: var(--green-soft); color: var(--green); }
        .avail-chip.no { background: var(--red-soft); color: var(--red); }

        /* Radio pick cards */
        .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
        .radio-pick {
            border: 1.5px solid var(--border); border-radius: var(--r-md);
            padding: 1rem 0.75rem; cursor: pointer; text-align: center;
            transition: all 0.2s ease; position: relative;
        }
        .radio-pick input { display: none; }
        .radio-pick:hover { border-color: var(--brand-light); background: var(--brand-xsoft); }
        .radio-pick.active { border-color: var(--brand); background: var(--brand-soft); box-shadow: 0 0 0 3px rgba(112,97,189,0.1); }
        .rp-icon { font-size: 1.55rem; color: var(--muted); margin-bottom: 0.35rem; transition: color 0.2s; }
        .radio-pick.active .rp-icon { color: var(--brand); }
        .rp-text { font-size: 0.88rem; font-weight: 600; color: var(--text); }
        .rp-check {
            position: absolute; top: 0.45rem; right: 0.45rem;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--brand); display: none; align-items: center; justify-content: center;
        }
        .rp-check i { font-size: 0.5rem; color: #fff; }
        .radio-pick.active .rp-check { display: flex; }

        /* Availability result */
        .avail-result { margin-top: 0.9rem; animation: cardUp 0.3s ease; }
        .avail-banner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; border-radius: var(--r-sm);
            border: 1.5px solid; font-size: 0.88rem; font-weight: 600;
        }
        .avail-banner.ok { background: var(--green-soft); border-color: rgba(0,192,139,0.25); color: var(--green); }
        .avail-banner.warn { background: #fff8e6; border-color: rgba(245,166,35,0.3); color: var(--gold-dark); }
        .avail-banner.no { background: var(--red-soft); border-color: rgba(240,79,95,0.25); color: var(--red); }
        .avail-banner .av-count {
            background: currentColor; color: #fff; font-size: 0.78rem; font-weight: 800;
            padding: 0.18rem 0.55rem; border-radius: 20px; opacity: 1;
            mix-blend-mode: normal;
        }
        .avail-banner .av-count-inner { background: #fff; color: inherit; border-radius: 20px; padding: 0.18rem 0.55rem; font-weight: 800; font-size: 0.78rem; }

        .room-input-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1.5px dashed var(--border); }
        .room-input-row { display: flex; align-items: flex-start; gap: 0.75rem; }
        .room-num-box { flex: 0 0 80px; }
        .room-num-box .f-input { text-align: center; font-weight: 700; font-size: 1.05rem; }
        .room-hints { flex: 1; }
        .r-hint { font-size: 0.76rem; color: var(--muted); display: flex; align-items: flex-start; gap: 0.35rem; line-height: 1.4; margin-bottom: 0.3rem; }
        .r-hint.ok { color: var(--green); font-weight: 600; }
        .r-hint i { margin-top: 2px; flex-shrink: 0; }

        /* Check-in info strip */
        .checkin-strip {
            background: linear-gradient(135deg, var(--brand-soft), var(--brand-xsoft));
            border: 1.5px solid rgba(112,97,189,0.15);
            border-radius: var(--r-sm); padding: 0.7rem 1rem;
            display: flex; align-items: center; gap: 0.7rem;
            margin-top: 0.75rem; font-size: 0.8rem; color: var(--brand-dark);
        }
        .checkin-strip i { flex-shrink: 0; color: var(--brand); }

        /* PDPA */
        .pdpa-box {
            background: var(--brand-xsoft); border: 1.5px solid rgba(112,97,189,0.15);
            border-radius: var(--r-md); padding: 1rem;
        }
        .pdpa-check-row { display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer; }
        .pdpa-checkbox {
            width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 5px;
            background: var(--surface); flex-shrink: 0; margin-top: 2px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; cursor: pointer;
        }
        .pdpa-checkbox.checked { background: var(--brand); border-color: var(--brand); }
        .pdpa-checkbox.checked::after { content: '✓'; color: #fff; font-size: 0.75rem; font-weight: 700; }
        input#pdpaConsent { display: none; }
        .pdpa-label { font-size: 0.82rem; color: var(--text-2); line-height: 1.55; }
        .pdpa-link { color: var(--brand); font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

        /* Submit */
        .submit-btn {
            width: 100%; padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: #fff; border: none; border-radius: var(--r-md);
            font-size: 1rem; font-weight: 700; font-family: inherit;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            transition: all 0.25s; box-shadow: 0 6px 20px rgba(112,97,189,0.35);
            letter-spacing: 0.01em;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(112,97,189,0.42); }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Loading overlay */
        .loading-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(26,21,53,0.6); backdrop-filter: blur(6px);
            z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner-box {
            background: var(--surface); border-radius: 20px; padding: 2.5rem 2rem;
            text-align: center; min-width: 200px; box-shadow: var(--shadow-lg);
        }
        .spinner-ring {
            width: 52px; height: 52px; border-radius: 50%;
            border: 4px solid var(--brand-soft);
            border-top-color: var(--brand);
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-msg { font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .loading-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }

        /* Alert strips */
        .alert-strip {
            display: flex; align-items: flex-start; gap: 0.6rem;
            padding: 0.75rem 0.9rem; border-radius: var(--r-sm);
            border: 1.5px solid; font-size: 0.82rem; line-height: 1.45;
        }
        .alert-strip.info { background: rgba(112,97,189,0.06); border-color: rgba(112,97,189,0.2); color: var(--brand-dark); }
        .alert-strip.warning { background: #fff8e6; border-color: rgba(245,166,35,0.3); color: var(--gold-dark); }
        .alert-strip.danger { background: var(--red-soft); border-color: rgba(240,79,95,0.22); color: var(--red); }
        .alert-strip i { flex-shrink: 0; margin-top: 1px; }
    </style>
</head>
<body>
<div class="app-container">

    <!-- HEADER -->
    <div class="page-header">
        <div class="header-bg-grid"></div>
        <div class="header-orb"></div>
        <div class="header-inner">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> หน้าหลัก</a>
            <div class="header-title-row">
                <div class="header-icon-box"><i class="fas fa-calendar-plus"></i></div>
                <div class="header-text-group">
                    <div class="page-title">จองห้องประชุม</div>
                    <div class="page-subtitle">ศูนย์ฝึกปฏิบัติการไฟฟ้าแรงสูง (ศฝฟ.)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loadingDiv">
        <div class="loading-spinner-box">
            <div class="spinner-ring"></div>
            <div class="loading-msg" id="loadingMsg">กำลังส่งข้อมูล...</div>
            <div class="loading-sub">กรุณาอย่าปิดหน้าต่างนี้</div>
        </div>
    </div>

    <!-- FORM AREA -->
    <div class="form-area" id="mainContent">

        <!-- PROGRESS STEPS -->
        <div class="steps-bar">
            <div class="steps-line"><div class="steps-line-fill" id="progressFill"></div></div>
            <div class="steps-track">
                <div class="step active" id="step1">
                    <div class="step-bubble">1</div>
                    <div class="step-name">ผู้จอง</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-bubble">2</div>
                    <div class="step-name">รายละเอียด</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-bubble">3</div>
                    <div class="step-name">ยืนยัน</div>
                </div>
            </div>
        </div>

        <form id="bookingForm">
            <!-- CARD 1: ข้อมูลผู้จอง -->
            <div class="form-card">
                <div class="card-head">
                    <div class="card-head-icon"><i class="fas fa-user-tie"></i></div>
                    <div class="card-head-title">ข้อมูลผู้จอง</div>
                </div>

                <div class="form-grp">
                    <label class="f-label">รหัสพนักงาน<span class="req">*</span></label>
                    <input class="f-input" type="text" name="employeeId" id="employeeId" placeholder="เช่น 123456" inputmode="numeric">
                </div>
                <div class="form-grp">
                    <label class="f-label">ชื่อ-นามสกุล<span class="req">*</span></label>
                    <input class="f-input" type="text" name="fullName" id="fullName" placeholder="ชื่อ นามสกุล">
                </div>
                <div class="form-grp">
                    <label class="f-label">สังกัดหน่วยงาน<span class="req">*</span></label>
                    <input class="f-input" type="text" name="department" id="department" placeholder="เช่น กอฟ. / กฟจ.สุพรรณบุรี">
                </div>
                <div class="form-grp">
                    <label class="f-label">เบอร์โทรศัพท์<span class="req">*</span></label>
                    <input class="f-input" type="tel" name="phone" id="phone" placeholder="0812345678" inputmode="tel">
                </div>
            </div>

            <!-- CARD 2: รายละเอียดการจอง -->
            <div class="form-card">
                <div class="card-head">
                    <div class="card-head-icon"><i class="fas fa-calendar-days"></i></div>
                    <div class="card-head-title">รายละเอียดการจอง</div>
                </div>

                <div class="form-grp">
                    <label class="f-label">ชื่อหลักสูตร/กิจกรรม<span class="req">*</span></label>
                    <input class="f-input" type="text" name="courseName" id="courseName" placeholder="ระบุชื่อหลักสูตรหรือกิจกรรม">
                </div>

                <div class="form-grp grid-2">
                    <div>
                        <label class="f-label">วันที่เริ่ม<span class="req">*</span></label>
                        <input class="f-input" type="date" name="startDate" id="startDate">
                    </div>
                    <div>
                        <label class="f-label">วันที่สิ้นสุด<span class="req">*</span></label>
                        <input class="f-input" type="date" name="endDate" id="endDate">
                    </div>
                </div>

                <!-- Meeting room dropdown -->
                <div class="form-grp">
                    <label class="f-label">ห้องประชุม<span class="req">*</span></label>
                    <div class="dropdown-wrap" id="roomDropdownWrap">
                        <div class="dropdown-trigger" id="roomTrigger">
                            <span class="dropdown-placeholder" id="roomDisplay">เลือกห้องประชุม</span>
                            <i class="fas fa-chevron-down dropdown-caret"></i>
                        </div>
                        <ul class="dropdown-panel" id="roomPanel">
                            <!-- populated by JS -->
                        </ul>
                        <input type="hidden" name="meetingRoom" id="meetingRoomInput">
                    </div>
                    <div class="f-hint" id="roomAvailHint" style="display:none;"></div>
                </div>

                <div class="form-grp">
                    <label class="f-label">จำนวนผู้เข้าร่วม (คน)<span class="req">*</span></label>
                    <input class="f-input" type="number" name="attendees" id="attendees" min="1" placeholder="0" inputmode="numeric">
                </div>
            </div>

            <!-- CARD 3: ที่พัก -->
            <div class="form-card">
                <div class="card-head">
                    <div class="card-head-icon"><i class="fas fa-bed"></i></div>
                    <div class="card-head-title">ต้องการที่พักหรือไม่?</div>
                </div>

                <div class="radio-grid" id="accommodationGroup">
                    <label class="radio-pick active" id="accNo">
                        <input type="radio" name="accommodation" value="ไม่ต้องการ" checked>
                        <div class="rp-icon"><i class="fas fa-xmark-circle"></i></div>
                        <div class="rp-text">ไม่ต้องการ</div>
                        <div class="rp-check"><i class="fas fa-check"></i></div>
                    </label>
                    <label class="radio-pick" id="accYes">
                        <input type="radio" name="accommodation" value="ต้องการ">
                        <div class="rp-icon"><i class="fas fa-door-open"></i></div>
                        <div class="rp-text">ต้องการ</div>
                        <div class="rp-check"><i class="fas fa-check"></i></div>
                    </label>
                </div>

                <!-- Accommodation detail (show when "ต้องการ") -->
                <div id="accommodationDetail" style="display:none; margin-top:0.85rem;">
                    <div id="accCheckResult">
                        <div class="alert-strip info"><i class="fas fa-info-circle"></i><span>เลือกวันที่จองเพื่อตรวจสอบห้องพักว่าง</span></div>
                    </div>
                </div>
            </div>

            <!-- CARD 4: PDPA & Submit -->
            <div class="form-card">
                <div class="card-head">
                    <div class="card-head-icon"><i class="fas fa-shield-halved"></i></div>
                    <div class="card-head-title">นโยบายความเป็นส่วนตัว</div>
                </div>
                <div class="pdpa-box" style="margin-bottom:1.25rem;">
                    <div class="pdpa-check-row" id="pdpaRow" onclick="togglePDPA()">
                        <div class="pdpa-checkbox" id="pdpaCheckbox"></div>
                        <label class="pdpa-label">
                            ฉันยอมรับ<span class="pdpa-link" onclick="showPDPADetail(event)">นโยบายคุ้มครองข้อมูลส่วนบุคคล (PDPA)</span>
                            และยินยอมให้ ศฝฟ. เก็บรวบรวมข้อมูลเพื่อวัตถุประสงค์การจองห้องประชุม
                        </label>
                    </div>
                    <input type="checkbox" id="pdpaConsent" name="pdpaConsent">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-paper-plane"></i>
                    ส่งคำขอจอง
                </button>
            </div>
        </form>
    </div>
</div>

<script>
const LIFF_ID = "2007138631-Ono58j50";
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VAtdyxSMkPIIWNBAqUa9YJw2XNT7-fcPqbsSPqsk1IkrVex0X83DUMcGOmIdCJLPMw/exec";
let userId = '', displayName = '';
let roomData = [];
let accommodationAvailable = true;
let maxAvailableRooms = 0;

const roomsConfig = {
    '[ห้อง Theater]Auditorium': { capacity: 120, cat: '120 ที่นั่ง' },
    'A201/1-2': { capacity: 130, cat: '120 ที่นั่ง' },
    'A201/1': { capacity: 70, cat: '60 ที่นั่ง' },
    'A201/2': { capacity: 70, cat: '60 ที่นั่ง' },
    'A202': { capacity: 70, cat: '60 ที่นั่ง' },
    'A203': { capacity: 70, cat: '60 ที่นั่ง' },
    'A204': { capacity: 50, cat: '40 ที่นั่ง' },
    'A205': { capacity: 50, cat: '40 ที่นั่ง' },
    'A206': { capacity: 50, cat: '40 ที่นั่ง' },
    'A207': { capacity: 30, cat: '30 ที่นั่ง' },
    'Computer 1': { capacity: 50, cat: '50 ที่นั่ง' },
    'Computer 2': { capacity: 50, cat: '50 ที่นั่ง' },
    'สนามฝึกกลางแจ้ง': { capacity: 200, cat: 'สนามฝึก' },
    'ห้องปฏิบัติการ SATS': { capacity: 40, cat: 'ห้องปฏิบัติการ' },
    'ห้องปฏิบัติการ DTS': { capacity: 40, cat: 'ห้องปฏิบัติการ' },
    'อาคาร E': { capacity: 200, cat: 'Event เท่านั้น' }
};

async function initializeLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        displayName = profile.displayName;
        sessionStorage.setItem('userId', userId);
        sessionStorage.setItem('displayName', displayName);
        loadRooms();
    } catch(err) {
        console.error(err);
        loadRooms(); // fallback
    }
}

async function loadRooms() {
    const panel = document.getElementById('roomPanel');
    panel.innerHTML = `<li style="padding:1rem;text-align:center;color:var(--muted);font-size:0.85rem;"><i class="fas fa-spinner fa-spin me-2"></i>กำลังโหลดห้อง...</li>`;
    try {
        const today = new Date().toISOString().split('T')[0];
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
        const res = await fetch(`${GAS_WEB_APP_URL}?action=checkRoomAvailability&startDate=${today}&endDate=${tomorrow}`);
        const data = await res.json();
        roomData = data.rooms || [];
    } catch(e) {
        roomData = Object.entries(roomsConfig).map(([name, cfg]) => ({ name, capacity: cfg.capacity, isAvailable: true, category: cfg.cat }));
    }
    buildRoomPanel();
}

function buildRoomPanel(startDate = null, endDate = null) {
    const panel = document.getElementById('roomPanel');
    panel.innerHTML = roomData.map(r => {
        const isAvail = r.isAvailable !== false;
        const cfg = roomsConfig[r.name] || {};
        return `<li class="drop-option ${isAvail ? '' : 'unavailable'}" 
            data-name="${r.name}" data-cap="${r.capacity || cfg.capacity || 0}" data-avail="${isAvail}"
            onclick="selectRoom('${r.name}', ${r.capacity || cfg.capacity || 0}, ${isAvail})">
            <div class="opt-left">
                <div class="opt-name">${r.name}</div>
                <div class="opt-cap">${r.category || cfg.cat || ''} · รองรับ ${r.capacity || cfg.capacity || '-'} คน</div>
            </div>
            <span class="avail-chip ${isAvail ? 'ok' : 'no'}">${isAvail ? '● ว่าง' : '✕ ไม่ว่าง'}</span>
        </li>`;
    }).join('');
}

function selectRoom(name, cap, isAvail) {
    if (!isAvail) return;
    document.getElementById('roomDisplay').textContent = name;
    document.getElementById('roomDisplay').classList.remove('dropdown-placeholder');
    document.getElementById('meetingRoomInput').value = name;
    document.getElementById('roomPanel').classList.remove('open');
    document.getElementById('roomTrigger').classList.remove('open');
    const hint = document.getElementById('roomAvailHint');
    hint.style.display = 'block';
    hint.innerHTML = `<i class="fas fa-users" style="color:var(--brand);margin-right:4px;"></i>รองรับสูงสุด <b>${cap}</b> คน`;
    updateProgress();
}

// Dropdown toggle
document.getElementById('roomTrigger').addEventListener('click', function() {
    this.classList.toggle('open');
    document.getElementById('roomPanel').classList.toggle('open');
});
document.addEventListener('click', function(e) {
    if (!document.getElementById('roomDropdownWrap').contains(e.target)) {
        document.getElementById('roomTrigger').classList.remove('open');
        document.getElementById('roomPanel').classList.remove('open');
    }
});

// PDPA toggle
function togglePDPA() {
    const cb = document.getElementById('pdpaConsent');
    const vis = document.getElementById('pdpaCheckbox');
    cb.checked = !cb.checked;
    vis.classList.toggle('checked', cb.checked);
    updateProgress();
}

// Accommodation radio
document.querySelectorAll('.radio-pick').forEach(card => {
    card.addEventListener('click', function() {
        document.querySelectorAll('.radio-pick').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        this.querySelector('input').checked = true;
        const wantsAcc = this.querySelector('input').value === 'ต้องการ';
        document.getElementById('accommodationDetail').style.display = wantsAcc ? 'block' : 'none';
        if (wantsAcc) checkAccommodation();
        updateProgress();
    });
});

async function checkAccommodation() {
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const attendees = parseInt(document.getElementById('attendees').value) || 0;
    if (!startDate || !endDate) {
        document.getElementById('accCheckResult').innerHTML = `<div class="alert-strip info"><i class="fas fa-calendar"></i><span>เลือกวันที่จองก่อนเพื่อตรวจสอบห้องพัก</span></div>`;
        return;
    }
    const suggestedRooms = attendees > 0 ? Math.ceil(attendees / 2) : 1;
    document.getElementById('accCheckResult').innerHTML = `<div class="alert-strip info"><i class="fas fa-spinner fa-spin"></i><span>กำลังตรวจสอบห้องพักว่าง...</span></div>`;
    try {
        const res = await fetch(`${GAS_WEB_APP_URL}?action=checkAccommodation&startDate=${startDate}&endDate=${endDate}&numRooms=${suggestedRooms}`);
        const data = await res.json();
        const available = data.availableRooms ?? 0;
        maxAvailableRooms = available;
        accommodationAvailable = available >= suggestedRooms;

        const sd = new Date(startDate); sd.setDate(sd.getDate() - 1);
        const checkinStr = sd.toLocaleDateString('th-TH', { day:'numeric', month:'short' });
        const coStr = new Date(endDate).toLocaleDateString('th-TH', { day:'numeric', month:'short' });

        let html = '';
        if (available > 0) {
            const cls = available >= suggestedRooms ? 'ok' : 'warn';
            html = `<div class="avail-banner ${cls}" style="margin-bottom:0.75rem;">
                <span><i class="fas fa-bed" style="margin-right:6px;"></i>ห้องพักว่าง</span>
                <span class="av-count-inner">${available} ห้อง</span>
            </div>
            <div class="checkin-strip"><i class="fas fa-calendar-check"></i>Check-in: ${checkinStr} · Check-out: ${coStr}</div>
            <div class="room-input-section">
                <div class="room-input-row">
                    <div class="room-num-box">
                        <label class="f-label">จำนวนห้อง</label>
                        <input class="f-input" type="number" name="numRooms" id="numRooms" min="1" max="${available}" value="${suggestedRooms > available ? available : suggestedRooms}" inputmode="numeric">
                    </div>
                    <div class="room-hints">
                        <div class="r-hint ok"><i class="fas fa-circle-check"></i>ห้องว่าง ${available} จาก 81 ห้อง</div>
                        <div class="r-hint"><i class="fas fa-info-circle"></i>แนะนำ ${suggestedRooms} ห้อง (${attendees} คน ÷ 2)</div>
                    </div>
                </div>
            </div>`;
        } else {
            html = `<div class="avail-banner no"><i class="fas fa-xmark-circle" style="margin-right:6px;"></i>ไม่มีห้องพักว่างในช่วงเวลานี้ โปรดเลือกวันอื่น</div>`;
            accommodationAvailable = false;
        }
        document.getElementById('accCheckResult').innerHTML = html;
    } catch(e) {
        accommodationAvailable = true;
        document.getElementById('accCheckResult').innerHTML = `<div class="alert-strip warning"><i class="fas fa-triangle-exclamation"></i><span>ตรวจสอบสถานะห้องพักไม่ได้ในขณะนี้</span></div>`;
    }
}

async function checkMeetingRoomAvailability() {
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    if (!startDate || !endDate) return;
    try {
        const res = await fetch(`${GAS_WEB_APP_URL}?action=checkRoomAvailability&startDate=${startDate}&endDate=${endDate}`);
        const data = await res.json();
        if (data.rooms) {
            roomData = data.rooms;
            buildRoomPanel(startDate, endDate);
        }
    } catch(e) {}
}

function updateProgress() {
    const s1 = document.getElementById('employeeId').value && document.getElementById('fullName').value && document.getElementById('department').value && document.getElementById('phone').value;
    const s2 = document.getElementById('courseName').value && document.getElementById('startDate').value && document.getElementById('endDate').value && document.getElementById('meetingRoomInput').value && document.getElementById('attendees').value;
    const s3 = document.getElementById('pdpaConsent').checked;
    const step1 = document.getElementById('step1'), step2 = document.getElementById('step2'), step3 = document.getElementById('step3');
    const fill = document.getElementById('progressFill');

    step1.classList.remove('active','done'); step2.classList.remove('active','done'); step3.classList.remove('active','done');
    if (s1 && s2 && s3) { step1.classList.add('done'); step2.classList.add('done'); step3.classList.add('active'); fill.style.width = '100%'; }
    else if (s1 && s2) { step1.classList.add('done'); step2.classList.add('done'); step3.classList.add('active'); fill.style.width = '100%'; }
    else if (s1) { step1.classList.add('done'); step2.classList.add('active'); fill.style.width = '50%'; }
    else { step1.classList.add('active'); fill.style.width = '0%'; }
}

document.querySelectorAll('.f-input, .f-select').forEach(el => {
    el.addEventListener('input', updateProgress);
    el.addEventListener('change', updateProgress);
});

document.getElementById('startDate').addEventListener('change', function() {
    const today = new Date().toISOString().split('T')[0];
    if (this.value < today) this.value = today;
    document.getElementById('endDate').min = this.value;
    checkMeetingRoomAvailability();
    if (document.querySelector('input[name="accommodation"]:checked')?.value === 'ต้องการ') checkAccommodation();
});
document.getElementById('endDate').addEventListener('change', function() {
    checkMeetingRoomAvailability();
    if (document.querySelector('input[name="accommodation"]:checked')?.value === 'ต้องการ') checkAccommodation();
});
document.getElementById('attendees').addEventListener('input', function() {
    if (document.querySelector('input[name="accommodation"]:checked')?.value === 'ต้องการ') checkAccommodation();
});

// Set min date
(function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').setAttribute('min', today);
    document.getElementById('endDate').setAttribute('min', today);
})();

function showPDPADetail(e) {
    e.stopPropagation();
    Swal.fire({ title: 'นโยบายคุ้มครองข้อมูลส่วนบุคคล (PDPA)', html: '<div style="text-align:left;font-size:0.9rem;line-height:1.7;"><p>ศฝฟ. จะเก็บรวบรวมข้อมูลส่วนบุคคล ได้แก่ อีเมล บัญชี LINE และหมายเลขโทรศัพท์ เพื่อใช้ในการติดต่อเกี่ยวกับการจองห้องพักและห้องประชุมเท่านั้น</p><p style="margin-top:0.75rem;"><b>ระยะเวลาการเก็บรักษา:</b> เก็บตามที่จำเป็นและตามกฎหมาย</p><p style="margin-top:0.75rem;">ท่านมีสิทธิ์เข้าถึง แก้ไข หรือเพิกถอนความยินยอมได้ตามหลักเกณฑ์ที่กฎหมายกำหนด</p></div>', icon: 'info', confirmButtonText: 'รับทราบ', confirmButtonColor: '#7061bd' });
}

document.getElementById('bookingForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!document.getElementById('pdpaConsent').checked) {
        Swal.fire({ title: 'กรุณายอมรับเงื่อนไข', text: 'ท่านต้องยอมรับนโยบาย PDPA ก่อนทำการจอง', icon: 'warning', confirmButtonText: 'ตกลง', confirmButtonColor: '#7061bd' }); return;
    }
    const selectedRoom = document.getElementById('meetingRoomInput').value;
    if (!selectedRoom) { Swal.fire({ title: 'กรุณาเลือกห้องประชุม', icon: 'warning', confirmButtonColor: '#7061bd' }); return; }

    const accChoice = document.querySelector('input[name="accommodation"]:checked');
    let numRoomsValue = 0;
    if (accChoice?.value === 'ต้องการ') {
        const numRoomsInput = document.getElementById('numRooms');
        if (numRoomsInput) {
            numRoomsValue = parseInt(numRoomsInput.value) || 0;
            if (numRoomsValue > maxAvailableRooms) { Swal.fire({ title: 'ห้องพักไม่เพียงพอ', html: `ห้องว่างเพียง <b>${maxAvailableRooms}</b> ห้อง`, icon: 'warning', confirmButtonColor: '#7061bd' }); return; }
            if (numRoomsValue <= 0) { Swal.fire({ title: 'ระบุจำนวนห้องพัก', icon: 'warning', confirmButtonColor: '#7061bd' }); return; }
        } else if (!accommodationAvailable) {
            Swal.fire({ title: 'ไม่มีห้องพักว่าง', icon: 'error', confirmButtonColor: '#7061bd' }); return;
        }
    }

    const fd = new FormData(this);
    const data = {
        userId, displayName,
        employeeId: fd.get('employeeId'), fullName: fd.get('fullName'),
        department: fd.get('department'), phone: fd.get('phone'),
        courseName: fd.get('courseName'), startDate: fd.get('startDate'),
        endDate: fd.get('endDate'), meetingRoom: selectedRoom,
        accommodation: fd.get('accommodation'), attendees: fd.get('attendees'),
        numRooms: numRoomsValue, timestamp: new Date().toISOString()
    };

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>กำลังส่ง...';
    document.getElementById('loadingDiv').classList.add('show');

    try {
        await fetch(GAS_WEB_APP_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
        document.getElementById('loadingDiv').classList.remove('show');
        await Swal.fire({ title: 'ส่งคำขอสำเร็จ! 🎉', html: '<p>ระบบบันทึกการจองแล้ว จะแจ้งผลทาง LINE</p>', icon:'success', confirmButtonText:'เสร็จสิ้น', confirmButtonColor:'#7061bd', allowOutsideClick:false });
        if (liff.isInClient()) liff.closeWindow(); else window.close();
    } catch(err) {
        document.getElementById('loadingDiv').classList.remove('show');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> ส่งคำขอจอง';
        Swal.fire({ title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่', icon:'error', confirmButtonColor:'#7061bd' });
    }
});

initializeLiff();
</script>
</body>
</html>
